<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TDMH Patient Satisfaction Survey</title>
  
  <!-- Tailwind CSS for Styling -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Configure Tailwind for Dark Mode via Class -->
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {},
      }
    }
  </script>

  <!-- Babel to compile React JSX in the browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Import Maps to load React and Lucide Icons directly in the browser -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.344.0?deps=react@18.2.0"
      }
    }
  </script>
</head>
<body class="transition-colors duration-300">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useMemo } from 'react';
    import { createRoot } from 'react-dom/client';
    import { 
      ClipboardList, LayoutDashboard, ChevronRight, SkipForward, 
      ThumbsUp, MessageSquare, Star, ArrowLeft, Settings, 
      UserCheck, AlertTriangle, Send, Lock, BarChart, QrCode, Printer, 
      BarChart3, Plus, Edit2, TrendingUp, TrendingDown, HeartHandshake, X, CalendarDays, RefreshCw, Save, Check, Moon, Sun,
      LogOut, Inbox, Scale, Trash2, Clock
    } from 'lucide-react';

    // --- CONFIGURATION & EXTERNAL ASSETS ---
    const FORM_CONTROL_NO = "TDMH-CQI-F-001-4-0";
    const GITHUB_BASE_URL = "https://raw.githubusercontent.com/tdmh-cqi/CustomerSurvey/main/images";
    const LOGO_URL = `${GITHUB_BASE_URL}/tdmh-logo.png`;
    const BACKGROUND_URL = `${GITHUB_BASE_URL}/tdmh-background.jpg`;

    // APPS SCRIPT WEB APP URL
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw93n00Ey6NoG92Nvcli_uAzeDINXBOL_i6El6txQvoYEp4pLFlQ5BSyxKUqUiI2DUCiQ/exec"; 

    // DEFAULT DEPARTMENTS (Updated to handle Checkbox logic natively)
    const DEFAULT_DEPARTMENTS = [
      { id: 'admitting', title: 'Admitting Services', type: 'standard', questions: [{ id: 'adm_1', text: 'How was your experience with the Admitting Services and the staff(s)?' }] },
      { id: 'er', title: 'Emergency Room Services', type: 'standard', questions: [{ id: 'er_1', text: 'How was your experience with the E.R Services and the staff(s)?' }] },
      { id: 'nursing', title: 'Patient Care/Nursing Services', type: 'standard', questions: [{ id: 'nur_1', text: 'How was your Experience with our Nursing Services/Staff(s)?' }] },
      { id: 'ancillary', title: 'Ancillary/Diagnostic Services', type: 'checkbox', services: ['Radiology', 'Pathology', 'Laboratory', 'Heart Station'] },
      { id: 'dietary', title: 'Dietary Services', type: 'standard', questions: [{ id: 'die_1', text: 'How was your experience with our Hospital\'s Food?' }] },
      { id: 'special', title: 'Special Services', type: 'checkbox', services: ['Operating Room', 'NICU', 'Hemodialysis', 'HOMES'] },
      { id: 'cashier', title: 'Cashier', type: 'standard', questions: [{ id: 'cas_1', text: 'How was your experience with Our Cashier Service/Staff(s)?' }] },
      { id: 'billing', title: 'Billing', type: 'standard', questions: [{ id: 'bil_1', text: 'How was your experience with our Billing Service/Staff(s)?' }] },
      { id: 'philhealth', title: 'Philhealth', type: 'standard', questions: [{ id: 'phi_1', text: 'How was your experience with the Philhealth Service/Staff(s)?' }] },
      { id: 'housekeeping', title: 'General Services: Housekeeping', type: 'standard', questions: [{ id: 'hsk_1', text: 'How was your experience with our Housekeeping Service/Staff(s)?' }] },
      { id: 'linens', title: 'General Services: Linens', type: 'standard', questions: [{ id: 'lin_1', text: 'How was your experience with our Linen Service/Staff(s)?' }] },
      { id: 'maintenance', title: 'General Services: Room Facilities & Utilities (Maintenance)', type: 'standard', questions: [{ id: 'mnt_1', text: 'How was your experience with our Maintenance Services/Staff(s)?' }] }
    ];

    // UPDATED: Date Removed, Patient Name now required for the Monitoring Tab
    const DEFAULT_INTAKE_QUESTIONS = [
      { id: 'patient_name', text: 'Patient Name', type: 'short_text', required: true },
      { id: 'room_number', text: 'Room Number / Ward', type: 'short_text', required: true },
      { id: 'contact_info', text: 'Email Address / Contact No. (Optional)', type: 'short_text', required: false }
    ];

    const GENERAL_QUESTIONS = [
      { id: 'gen_1', text: 'Is this your first time being admitted to this facility?', type: 'yesno', required: true },
      { id: 'gen_2', text: 'Have you visited or have you been admitted to another hospital?', type: 'yesno', required: true },
      { id: 'gen_3', text: 'How do you compare Taytay Doctors Multispecialty Hospital to other hospitals?', type: 'compare', required: true },
      { id: 'gen_4', text: 'Do you want to receive health tips and service updates from Taytay Doctors?', type: 'yesno', required: true },
      { id: 'gen_5', text: 'Would you recommend our hospital to your family and friends?', type: 'yesno', required: true },
      { id: 'gen_6', text: 'Generally, were you satisfied with our services?', type: 'yesno', required: true }
    ];

    const getMonthString = (dateObj) => `${dateObj.getFullYear()}-${String(dateObj.getMonth() + 1).padStart(2, '0')}`;
    const ALL_MONTHS_LABELS = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
    
    // DYNAMIC FLATTENER
    const getFlatDepartments = (depts) => {
        let flat = [];
        depts.forEach(d => {
            flat.push(d); 
            if (d.type === 'checkbox' && d.services) {
                d.services.forEach(svc => {
                    flat.push({ id: `${d.id}_${svc}`, title: `${d.title} (${svc})`, type: 'sub', parentId: d.id });
                });
            }
        });
        return flat;
    };

    // BUMPED VERSION TO WIPE LOCAL CACHE AND FIX THE COUNT GLITCH
    const VERSION_KEY = "tdmh_system_v12";

    function App() {
      const [view, setView] = useState('home'); 
      const [activeDeptId, setActiveDeptId] = useState(null); 
      const [isSubmitting, setIsSubmitting] = useState(false);
      const [showSuccess, setShowSuccess] = useState(false);
      const [isSyncing, setIsSyncing] = useState(false);
      const [drillDown, setDrillDown] = useState(null); 
      
      const [authUser, setAuthUser] = useState(() => {
         try { return JSON.parse(localStorage.getItem('tdmh_auth')) || null; } catch(e) { return null; }
      });
      const [loginToast, setLoginToast] = useState(null);

      const [commentCats, setCommentCats] = useState(() => {
         try { return JSON.parse(localStorage.getItem('tdmh_comment_cats')) || {}; } catch(e) { return {}; }
      });
      useEffect(() => localStorage.setItem('tdmh_comment_cats', JSON.stringify(commentCats)), [commentCats]);

      const [isDark, setIsDark] = useState(() => {
        const savedTheme = localStorage.getItem('tdmh_theme');
        return savedTheme === 'dark';
      });

      // CORE FIX FOR YOUR SCREENSHOT ISSUE: Fully wipe old local responses if version changes
      useEffect(() => {
        if (localStorage.getItem('tdmh_version') !== VERSION_KEY) {
          localStorage.removeItem('tdmh_departments');
          localStorage.removeItem('tdmh_active_depts');
          localStorage.removeItem('tdmh_intake_qs');
          localStorage.removeItem('tdmh_responses'); 
          localStorage.removeItem('tdmh_last_sync');
          localStorage.setItem('tdmh_version', VERSION_KEY);
        }
      }, []);

      useEffect(() => {
        const rootElement = document.documentElement;
        if (isDark) {
          rootElement.classList.add('dark');
          localStorage.setItem('tdmh_theme', 'dark');
        } else {
          rootElement.classList.remove('dark');
          localStorage.setItem('tdmh_theme', 'light');
        }
      }, [isDark]);

      useEffect(() => {
        if (view === 'qr') {
          document.body.classList.add('printing-qr');
        } else {
          document.body.classList.remove('printing-qr');
        }
      }, [view]);

      const toggleTheme = () => {
        if (!document.startViewTransition) {
          setIsDark(!isDark);
          return;
        }
        document.startViewTransition(() => {
          setIsDark(prev => !prev);
        });
      };

      const [responses, setResponses] = useState(() => {
        const saved = localStorage.getItem('tdmh_responses');
        try { return saved ? JSON.parse(saved) : []; } catch(e) { return []; }
      });

      const [censusData, setCensusData] = useState(() => {
        const saved = localStorage.getItem('tdmh_census');
        try { return saved ? JSON.parse(saved) : {}; } catch(e) { return {}; }
      });

      const [intakeQuestions, setIntakeQuestions] = useState(() => {
        const version = localStorage.getItem('tdmh_version');
        if (version !== VERSION_KEY) return DEFAULT_INTAKE_QUESTIONS;
        const saved = localStorage.getItem('tdmh_intake_qs'); 
        try { return saved ? JSON.parse(saved) : DEFAULT_INTAKE_QUESTIONS; } catch(e) { return DEFAULT_INTAKE_QUESTIONS; }
      });

      const [departments, setDepartments] = useState(() => {
        const version = localStorage.getItem('tdmh_version');
        if (version !== VERSION_KEY) return DEFAULT_DEPARTMENTS;
        const saved = localStorage.getItem('tdmh_departments'); 
        try { return saved ? JSON.parse(saved) : DEFAULT_DEPARTMENTS; } catch(e) { return DEFAULT_DEPARTMENTS; }
      });
      
      const [activeDepartments, setActiveDepartments] = useState(() => {
        const defaultActive = DEFAULT_DEPARTMENTS.reduce((acc, dept) => ({ ...acc, [dept.id]: true }), {});
        const version = localStorage.getItem('tdmh_version');
        if (version !== VERSION_KEY) return defaultActive;
        const saved = localStorage.getItem('tdmh_active_depts'); 
        try { return saved ? JSON.parse(saved) : defaultActive; } catch(e) { return defaultActive; }
      });

      const flatDepartments = useMemo(() => getFlatDepartments(departments), [departments]);

      useEffect(() => localStorage.setItem('tdmh_intake_qs', JSON.stringify(intakeQuestions)), [intakeQuestions]);
      useEffect(() => localStorage.setItem('tdmh_departments', JSON.stringify(departments)), [departments]);
      useEffect(() => localStorage.setItem('tdmh_active_depts', JSON.stringify(activeDepartments)), [activeDepartments]);

      useEffect(() => {
        if (!APPS_SCRIPT_URL) return;
        const fetchHistory = async () => {
          if (view === 'admin' || view === 'dept') setIsSyncing(true);
          try {
            const lastSync = localStorage.getItem('tdmh_last_sync') || '';
            const fetchUrl = lastSync ? `${APPS_SCRIPT_URL}?lastSync=${encodeURIComponent(lastSync)}&includeCensus=true` : `${APPS_SCRIPT_URL}?includeCensus=true`;
            const res = await fetch(fetchUrl);
            const newData = await res.json();
            
            if (newData.census) {
              const normalizedCensus = {};
              Object.keys(newData.census).forEach(k => {
                 let cleanKey = k.replace(/^'/, ''); 
                 if (!/^\d{4}-\d{2}$/.test(cleanKey)) {
                    const d = new Date(cleanKey);
                    if (!isNaN(d.getTime())) {
                       cleanKey = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
                    }
                 }
                 normalizedCensus[cleanKey] = newData.census[k];
              });
              setCensusData(prev => {
                 const merged = { ...prev, ...normalizedCensus };
                 localStorage.setItem('tdmh_census', JSON.stringify(merged));
                 return merged;
              });
            }

            if (newData.categories && Object.keys(newData.categories).length > 0) {
               setCommentCats(prev => {
                  const merged = { ...prev, ...newData.categories };
                  localStorage.setItem('tdmh_comment_cats', JSON.stringify(merged));
                  return merged;
               });
            }

            const resArray = newData.responses || (Array.isArray(newData) ? newData : []);
            if (Array.isArray(resArray) && resArray.length > 0) {
              setResponses(prev => {
                const combined = [...resArray, ...prev];
                const uniqueMap = new Map();
                // Enhanced deduplication ID finding
                combined.forEach(item => { 
                   if (item.id) uniqueMap.set(item.id, item); 
                   else uniqueMap.set(item.timestamp, item); 
                });
                const sortedUnique = Array.from(uniqueMap.values()).sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
                localStorage.setItem('tdmh_responses', JSON.stringify(sortedUnique));
                return sortedUnique;
              });
            }
            localStorage.setItem('tdmh_last_sync', new Date().toISOString());
          } catch (err) {
            console.warn("Sync paused (Offline or CORS). Running on local database.");
          } finally {
            setIsSyncing(false);
          }
        };

        fetchHistory();
        const intervalId = setInterval(() => { if (view === 'admin' || view === 'dept') fetchHistory(); }, 30000); 
        return () => clearInterval(intervalId); 
      }, [view]);

      // CORE FIX: Let's user manually wipe the local cache and redownload everything
      const handleHardRefresh = () => {
         if (window.confirm("This will clear the local cache and re-download all data directly from Google Sheets to ensure it matches perfectly. Continue?")) {
            localStorage.removeItem('tdmh_responses');
            localStorage.removeItem('tdmh_last_sync');
            window.location.reload();
         }
      };

      const handleSurveySubmit = async (surveyData) => {
        setIsSubmitting(true);
        const liveNow = new Date();
        const finalData = { 
            ...surveyData, 
            general: { ...surveyData.general, date: liveNow.toLocaleDateString() },
            timestamp: liveNow.toLocaleString(), 
            id: Date.now().toString() 
        };
        
        Object.keys(finalData.departments).forEach(id => {
          const matched = flatDepartments.find(d => d.id === id);
          if (matched) finalData.departments[id].title = matched.title;
        });
        
        setResponses(prev => {
          const newResponses = [finalData, ...prev];
          localStorage.setItem('tdmh_responses', JSON.stringify(newResponses));
          return newResponses;
        });

        setIsSubmitting(false); 
        setShowSuccess(true);
        window.scrollTo({ top: 0, behavior: 'smooth' });

        if (APPS_SCRIPT_URL) {
          try {
            fetch(APPS_SCRIPT_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(finalData) }).catch(e => console.log("Background sync error:", e));
          } catch (error) { console.error("Error saving to Google Sheets:", error); }
        }
      };

      const handleCloseSuccess = () => {
        setShowSuccess(false);
        setView('home');
        window.scrollTo({ top: 0, behavior: 'instant' });
      }

      const handleLogout = () => {
         setAuthUser(null);
         localStorage.removeItem('tdmh_auth');
         setView('home');
      }

      return (
        <div className={`min-h-screen transition-colors duration-500 bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 selection:bg-blue-200 dark:selection:bg-blue-800 relative pro-font flex flex-col ${(drillDown || showSuccess) ? 'overflow-hidden' : ''}`}>
          <style dangerouslySetInnerHTML={{__html: `
            @import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap');
            .pro-font { font-family: 'Lora', serif; }
            .hide-scrollbar::-webkit-scrollbar { display: none; }
            .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
            
            .custom-scrollbar::-webkit-scrollbar { height: 8px; }
            .custom-scrollbar::-webkit-scrollbar-track { background: transparent; border-radius: 8px; }
            .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 8px; }
            .dark .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; }
            
            ::view-transition-old(root),
            ::view-transition-new(root) {
              animation: none;
              mix-blend-mode: normal;
            }
            ::view-transition-old(root) { z-index: 1; }
            ::view-transition-new(root) { z-index: 2; }
            
            .dark::view-transition-new(root),
            :not(.dark)::view-transition-new(root) {
              animation: diagonal-wipe 0.8s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            }
            
            @keyframes diagonal-wipe {
              0% { clip-path: circle(0% at 100% 0%); }
              100% { clip-path: circle(150% at 100% 0%); }
            }

            @media print {
              @page { size: letter portrait; margin: 0; }
              html, body { 
                -webkit-print-color-adjust: exact !important; 
                print-color-adjust: exact !important; 
                margin: 0; padding: 0; width: 100%; height: 100%;
              }
              
              header, button.fixed, .fixed.bottom-3, .fixed.inset-0.z-0, .no-print { display: none !important; }
              
              body.printing-qr { background-color: #f8fafc !important; overflow: hidden !important; }
              body.printing-qr.dark { background-color: #0f172a !important; }
              
              body.printing-qr #root, body.printing-qr main { 
                  max-width: none !important; width: 100vw !important; height: 100vh !important; 
                  margin: 0 !important; padding: 0 !important; display: flex !important; 
                  align-items: center !important; justify-content: center !important; 
              }
              
              .print-qr-poster {
                  position: absolute !important; top: 0 !important; left: 0 !important;
                  width: 100vw !important; height: 100vh !important;
                  display: flex !important; align-items: center !important; justify-content: center !important;
                  margin: 0 !important; padding: 0 !important; border: none !important; box-shadow: none !important; border-radius: 0 !important; background: transparent !important;
              }
              
              .print-qr-card-wrapper {
                  transform: scale(0.85); transform-origin: center center;
                  width: 100%; display: flex; justify-content: center;
              }

              body:not(.printing-qr) * { visibility: hidden; background: white; }
              body:not(.printing-qr) .print-dashboard, body:not(.printing-qr) .print-dashboard * { visibility: visible; color: black !important; }
              body:not(.printing-qr) .print-dashboard { position: absolute; left: 0; top: 0; width: 100%; height: auto; margin: 0; padding: 0; background: white !important; box-shadow: none !important; border: none !important; display: block !important; }
              
              body.printing-modal .print-modal-content, body.printing-modal .print-modal-content * { visibility: visible; color: black !important; }
              body.printing-modal .print-modal-content { position: absolute; left: 0; top: 0; width: 100%; height: auto; box-shadow: none; border: none; }
            }
          `}} />

          {drillDown && <style>{`body { class: "printing-modal" }`}</style>}
          {!drillDown && <style>{`body { class: "" }`}</style>}

          {loginToast && (
             <div className="fixed top-24 left-1/2 transform -translate-x-1/2 z-[100] bg-green-600 text-white px-6 py-3 rounded-2xl shadow-2xl flex items-center gap-3 animate-in fade-in slide-in-from-top-4 duration-300 font-sans font-bold">
                <Check className="w-5 h-5"/> {loginToast}
             </div>
          )}

          <div className="fixed inset-0 z-0 pointer-events-none transition-colors duration-700">
             <div className={`absolute inset-0 bg-cover bg-center bg-fixed transition-opacity duration-700 ${isDark ? 'opacity-[0.15] mix-blend-luminosity' : 'opacity-20 mix-blend-multiply'}`} style={{ backgroundImage: `url('${BACKGROUND_URL}')` }} />
             <div className={`absolute inset-0 transition-opacity duration-700 ${isDark ? 'bg-blue-950/80 opacity-100' : 'bg-transparent opacity-0'}`} />
          </div>
          
          <button 
             onClick={toggleTheme} 
             className="fixed top-4 right-4 z-50 p-3 sm:p-4 rounded-full bg-white/90 dark:bg-slate-800/90 backdrop-blur-md shadow-lg border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-yellow-400 hover:scale-110 active:scale-95 transition-all no-print"
             title="Toggle Night Mode"
          >
             {isDark ? <Sun className="w-6 h-6" /> : <Moon className="w-6 h-6" />}
          </button>

          {view !== 'survey' && (
            <header className="bg-white/95 dark:bg-slate-900/95 backdrop-blur-md shadow-sm border-b-4 border-blue-600 dark:border-blue-500 sticky top-0 z-20 no-print transition-colors duration-300">
              <div className="max-w-6xl mx-auto px-4 py-3 sm:py-4 flex items-center justify-between relative min-h-[6rem] sm:min-h-[7rem]">
                <div className="flex-1 flex justify-start items-center gap-2">
                  {view === 'home' && (
                    <button onClick={() => setView('qr')} className="text-sm font-bold text-slate-500 dark:text-slate-400 hover:text-blue-700 dark:hover:text-blue-400 flex items-center gap-2 px-3 py-2 rounded-xl transition-all hover:bg-blue-50 dark:hover:bg-slate-800 border border-transparent dark:border-slate-700 shadow-sm bg-white dark:bg-slate-800">
                      <QrCode className="w-5 h-5" /> <span className="hidden sm:inline">Show QR Sign</span>
                    </button>
                  )}
                  
                  {/* HARD REFRESH BUTTON ADDED HERE */}
                  {(view === 'admin' || view === 'dept') && (
                    <>
                       <button onClick={handleHardRefresh} className="text-xs font-bold text-slate-500 dark:text-slate-400 hover:text-blue-600 dark:hover:text-blue-400 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 hover:border-blue-300 dark:hover:border-blue-700 px-3 py-1.5 rounded-lg flex items-center gap-2 shadow-sm transition-all" title="Force redownload from database">
                         <RefreshCw className="w-3 h-3"/> Re-Sync DB
                       </button>
                       {isSyncing && <span className="text-[10px] font-bold text-slate-400 animate-pulse ml-2">Syncing...</span>}
                    </>
                  )}
                </div>
                <div className="flex-1 flex justify-center cursor-pointer group" title="Reload System" onClick={() => window.location.reload()}>
                  <div className="bg-white/80 dark:bg-white px-4 sm:px-6 py-2 rounded-2xl shadow-sm transition-colors duration-300 flex items-center justify-center">
                    <img src={LOGO_URL} alt="Taytay Doctors Logo" className="h-16 sm:h-20 md:h-24 lg:h-28 w-auto object-contain transition-all duration-300 group-hover:scale-110 drop-shadow-sm" />
                  </div>
                </div>
                <div className="flex-1 flex justify-end items-center gap-4 pr-16 sm:pr-20"> 
                  {view === 'home' && (
                    <button onClick={() => {
                       if (authUser) {
                          if (authUser.role === 'admin') setView('admin');
                          else { setActiveDeptId(authUser.id); setView('dept'); }
                       } else {
                          setView('login');
                       }
                    }} className="text-sm font-bold text-slate-500 dark:text-slate-400 hover:text-blue-700 dark:hover:text-blue-400 flex items-center gap-2 px-3 py-2 rounded-xl transition-all hover:bg-blue-50 dark:hover:bg-slate-800 shadow-sm bg-white dark:bg-slate-800 border border-transparent dark:border-slate-700">
                      <Lock className="w-4 h-4" /> <span className="hidden lg:inline">{authUser ? `Dashboard (${authUser.name})` : "Staff Portal"}</span>
                    </button>
                  )}
                  {view !== 'home' && (
                    <div className="flex items-center gap-2">
                       <button onClick={() => setView('home')} className="text-sm font-bold text-blue-800 dark:text-blue-200 hover:text-white dark:hover:text-white hover:bg-blue-600 dark:hover:bg-blue-600 flex items-center gap-2 bg-blue-100 dark:bg-blue-900/50 px-4 py-2.5 rounded-xl transition-all shadow-sm">
                         <ArrowLeft className="w-5 h-5" /> <span className="hidden sm:inline">HOME</span>
                       </button>
                       {authUser && (view === 'admin' || view === 'dept') && (
                         <button onClick={handleLogout} className="text-sm font-bold text-slate-500 dark:text-slate-400 hover:text-red-600 dark:hover:text-red-400 flex items-center gap-2 bg-white dark:bg-slate-800 px-4 py-2.5 rounded-xl transition-all shadow-sm border border-slate-200 dark:border-slate-700 hover:border-red-200 dark:hover:border-red-900" title="Log Out">
                           <LogOut className="w-4 h-4" />
                         </button>
                       )}
                    </div>
                  )}
                </div>
              </div>
            </header>
          )}

          <main className={`max-w-5xl mx-auto w-full relative z-10 flex-grow transition-all duration-300 ${view === 'survey' ? 'p-0 sm:p-6 lg:p-8 mt-16 sm:mt-0' : 'p-4 sm:p-6 lg:p-8'}`}>
            {view === 'home' && <HomeView setView={setView} />}
            {view === 'survey' && <PatientSurvey onSubmit={handleSurveySubmit} intakeQuestions={intakeQuestions} activeDepartments={activeDepartments} departments={departments} isSubmitting={isSubmitting} setView={setView} />}
            {view === 'login' && <LoginSelectView setView={setView} setActiveDeptId={setActiveDeptId} departments={departments} flatDepartments={flatDepartments} setAuthUser={setAuthUser} setLoginToast={setLoginToast} />}
            {view === 'admin' && <AdminDashboard responses={responses} censusData={censusData} setCensusData={setCensusData} activeDepartments={activeDepartments} setActiveDepartments={setActiveDepartments} departments={departments} setDepartments={setDepartments} flatDepartments={flatDepartments} drillDown={drillDown} setDrillDown={setDrillDown} commentCats={commentCats} setCommentCats={setCommentCats} intakeQuestions={intakeQuestions} setIntakeQuestions={setIntakeQuestions} handleHardRefresh={handleHardRefresh} />}
            {view === 'dept' && <DepartmentDashboard responses={responses} deptId={activeDeptId} departments={departments} flatDepartments={flatDepartments} commentCats={commentCats} setCommentCats={setCommentCats} />}
            {view === 'qr' && <QRGenerator />}
          </main>

          <div className="fixed bottom-3 left-4 z-20 text-xs sm:text-sm font-bold text-slate-500/80 dark:text-slate-400/50 pointer-events-none tracking-widest no-print">
            {FORM_CONTROL_NO}
          </div>

          {drillDown && <DrillDownModal drillDown={drillDown} setDrillDown={setDrillDown} />}
          {showSuccess && <SuccessModal onClose={handleCloseSuccess} />}
        </div>
      );
    }

    function CommentManager({ comments, commentCats, setCommentCats, selectedMonth, onMonthChange, monthsList, showDeptFilter, flatDepartments, selectedDept, onDeptChange }) {
       const [catTab, setCatTab] = useState('inbox');

       const handleSetCat = (id, category) => {
          setCommentCats(prev => {
             const updated = { ...prev };
             if (category === 'uncategorized') delete updated[id];
             else updated[id] = category;
             
             fetch(APPS_SCRIPT_URL, {
                method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: "update_comment_cats", categories: updated })
             }).catch(e => console.log(e));

             return updated;
          });
       };

       const inboxList = comments.filter(c => !commentCats[c.id]);
       const posList = comments.filter(c => commentCats[c.id] === 'positive');
       const mixList = comments.filter(c => commentCats[c.id] === 'mixed');
       const negList = comments.filter(c => commentCats[c.id] === 'negative');

       const currentList = catTab === 'inbox' ? inboxList : catTab === 'positive' ? posList : catTab === 'mixed' ? mixList : negList;

       return (
         <div className="space-y-8 animate-in slide-in-from-bottom-2 no-print font-sans">
            <div className="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 p-6 sm:p-8 rounded-3xl shadow-sm flex flex-col sm:flex-row gap-6 transition-colors items-end">
               <div className="flex-1 w-full">
                  <label className="block text-slate-500 dark:text-slate-400 font-black text-sm mb-3 uppercase tracking-widest">Filter by Month</label>
                  <select className="w-full p-4 rounded-xl border-2 border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900/50 font-bold text-slate-700 dark:text-white outline-none focus:border-blue-500 transition-colors text-lg" value={selectedMonth} onChange={e => onMonthChange(e.target.value)}>
                     {monthsList.map((mk, i) => <option key={mk} value={mk}>{ALL_MONTHS_LABELS[parseInt(mk.split('-')[1])-1]} {mk.split('-')[0]}</option>)}
                  </select>
               </div>
               {showDeptFilter && (
                 <div className="flex-1 w-full">
                    <label className="block text-slate-500 dark:text-slate-400 font-black text-sm mb-3 uppercase tracking-widest">Filter by Department</label>
                    <select className="w-full p-4 rounded-xl border-2 border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900/50 font-bold text-slate-700 dark:text-white outline-none focus:border-blue-500 transition-colors text-lg" value={selectedDept} onChange={e => onDeptChange(e.target.value)}>
                       <option value="all">All Departments</option>
                       {flatDepartments.map(d => <option key={d.id} value={d.id}>{d.type === 'sub' ? `— ${d.title}` : d.title}</option>)}
                    </select>
                 </div>
               )}
            </div>

            <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
               <button onClick={() => setCatTab('inbox')} className={`p-4 rounded-2xl border-2 font-black text-lg transition-all flex items-center justify-center gap-2 ${catTab === 'inbox' ? 'bg-slate-800 border-slate-800 text-white' : 'bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-700 text-slate-500 dark:text-slate-400 hover:border-slate-400'}`}>
                  <Inbox className="w-5 h-5"/> Inbox
                  {inboxList.length > 0 && <span className={`px-2 py-0.5 text-xs rounded-full ${catTab === 'inbox' ? 'bg-white text-slate-800' : 'bg-slate-200 dark:bg-slate-700 text-slate-600 dark:text-slate-300'}`}>{inboxList.length}</span>}
               </button>
               <button onClick={() => setCatTab('positive')} className={`p-4 rounded-2xl border-2 font-black text-lg transition-all flex items-center justify-center gap-2 ${catTab === 'positive' ? 'bg-green-500 border-green-500 text-white' : 'bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-700 text-slate-500 dark:text-slate-400 hover:border-green-300'}`}>
                  <ThumbsUp className="w-5 h-5"/> Positive
                  {posList.length > 0 && <span className={`px-2 py-0.5 text-xs rounded-full ${catTab === 'positive' ? 'bg-white text-green-700' : 'bg-slate-200 dark:bg-slate-700 text-slate-600 dark:text-slate-300'}`}>{posList.length}</span>}
               </button>
               <button onClick={() => setCatTab('mixed')} className={`p-4 rounded-2xl border-2 font-black text-lg transition-all flex items-center justify-center gap-2 ${catTab === 'mixed' ? 'bg-amber-500 border-amber-500 text-white' : 'bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-700 text-slate-500 dark:text-slate-400 hover:border-amber-300'}`}>
                  <Scale className="w-5 h-5"/> Mixed
                  {mixList.length > 0 && <span className={`px-2 py-0.5 text-xs rounded-full ${catTab === 'mixed' ? 'bg-white text-amber-700' : 'bg-slate-200 dark:bg-slate-700 text-slate-600 dark:text-slate-300'}`}>{mixList.length}</span>}
               </button>
               <button onClick={() => setCatTab('negative')} className={`p-4 rounded-2xl border-2 font-black text-lg transition-all flex items-center justify-center gap-2 ${catTab === 'negative' ? 'bg-red-500 border-red-500 text-white' : 'bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-700 text-slate-500 dark:text-slate-400 hover:border-red-300'}`}>
                  <AlertTriangle className="w-5 h-5"/> Negative
                  {negList.length > 0 && <span className={`px-2 py-0.5 text-xs rounded-full ${catTab === 'negative' ? 'bg-white text-red-700' : 'bg-slate-200 dark:bg-slate-700 text-slate-600 dark:text-slate-300'}`}>{negList.length}</span>}
               </button>
            </div>

            <div className="bg-slate-100/50 dark:bg-slate-900/50 p-6 rounded-[2rem] border border-slate-200 dark:border-slate-700 min-h-[400px]">
               {currentList.length === 0 ? (
                  <div className="flex flex-col items-center justify-center h-full text-slate-400 min-h-[300px]">
                     <MessageSquare className="w-12 h-12 mb-4 opacity-20"/>
                     <p className="font-bold text-lg">No comments in this category.</p>
                  </div>
               ) : (
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                     {currentList.map(c => (
                        <div key={c.id} className="bg-white dark:bg-slate-800 p-6 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 flex flex-col justify-between">
                           <div>
                              {showDeptFilter && selectedDept === 'all' && (
                                <div className="bg-blue-50 dark:bg-blue-900/30 text-blue-800 dark:text-blue-300 px-3 py-1 rounded-lg font-black text-xs mb-4 inline-block uppercase tracking-wider">{c.deptName}</div>
                              )}
                              <p className="text-slate-800 dark:text-white font-medium text-lg leading-relaxed mb-4">"{c.text}"</p>
                              <div className="flex flex-wrap items-center gap-3 text-sm mb-6 border-t border-slate-100 dark:border-slate-700 pt-4">
                                 <span className="text-slate-400 font-bold uppercase tracking-wider">{new Date(c.date).toLocaleDateString()}</span>
                                 <span className="font-bold text-slate-600 dark:text-slate-300 bg-slate-100 dark:bg-slate-700 px-2 py-0.5 rounded">Room: {c.room}</span>
                                 {c.score > 0 && <span className="font-bold text-slate-500 bg-slate-100 dark:bg-slate-700 px-2 py-0.5 rounded">Avg Score: {c.score.toFixed(1)}</span>}
                              </div>
                           </div>
                           
                           <div className="bg-slate-50 dark:bg-slate-900 p-3 rounded-xl border border-slate-200 dark:border-slate-700">
                              <p className="text-xs font-bold text-slate-400 mb-2 uppercase tracking-widest text-center">Categorize As:</p>
                              <div className="flex gap-2">
                                 <button onClick={() => handleSetCat(c.id, 'positive')} className={`flex-1 py-2 rounded-lg font-bold text-sm transition-colors ${commentCats[c.id] === 'positive' ? 'bg-green-500 text-white' : 'bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-300 border border-slate-200 dark:border-slate-600 hover:bg-green-50 dark:hover:bg-green-900/30 hover:text-green-600 dark:hover:text-green-400'}`}>👍 Pos</button>
                                 <button onClick={() => handleSetCat(c.id, 'mixed')} className={`flex-1 py-2 rounded-lg font-bold text-sm transition-colors ${commentCats[c.id] === 'mixed' ? 'bg-amber-500 text-white' : 'bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-300 border border-slate-200 dark:border-slate-600 hover:bg-amber-50 dark:hover:bg-amber-900/30 hover:text-amber-600 dark:hover:text-amber-400'}`}>⚖️ Mix</button>
                                 <button onClick={() => handleSetCat(c.id, 'negative')} className={`flex-1 py-2 rounded-lg font-bold text-sm transition-colors ${commentCats[c.id] === 'negative' ? 'bg-red-500 text-white' : 'bg-white dark:bg-slate-800 text-slate-600 dark:text-slate-300 border border-slate-200 dark:border-slate-600 hover:bg-red-50 dark:hover:bg-red-900/30 hover:text-red-600 dark:hover:text-red-400'}`}>👎 Neg</button>
                              </div>
                              {commentCats[c.id] && (
                                <button onClick={() => handleSetCat(c.id, 'uncategorized')} className="w-full mt-2 py-1 text-xs font-bold text-slate-400 hover:text-slate-600 dark:hover:text-white transition-colors">Clear Category (Send to Inbox)</button>
                              )}
                           </div>
                        </div>
                     ))}
                  </div>
               )}
            </div>
         </div>
       )
    }

    function HomeView({ setView }) {
      return (
        <div className="flex flex-col items-center justify-center min-h-[70vh] animate-in fade-in zoom-in duration-500">
          <div className="bg-white/95 dark:bg-slate-900/90 backdrop-blur-md p-8 sm:p-14 rounded-[2rem] shadow-2xl border border-white/50 dark:border-slate-700/50 max-w-xl w-full text-center relative overflow-hidden transition-colors">
            <div className="relative z-10">
              <div className="w-24 h-24 bg-gradient-to-br from-blue-600 to-indigo-800 dark:from-blue-500 dark:to-indigo-700 text-white rounded-3xl flex items-center justify-center mx-auto mb-8 shadow-xl shadow-blue-500/20 dark:shadow-blue-900/40 rotate-3 transform hover:rotate-0 transition-transform"><ClipboardList className="w-12 h-12 -rotate-3" /></div>
              <h2 className="text-3xl sm:text-4xl font-black text-slate-900 dark:text-white mb-4 tracking-tight leading-snug">Patient Satisfaction Survey</h2>
              <p className="text-slate-600 dark:text-slate-300 mb-10 font-medium text-lg leading-relaxed">We value your health and your opinion. Please take a moment to rate your experience so we can serve you better.</p>
              <button onClick={() => setView('survey')} className="w-full bg-gradient-to-r from-blue-600 to-indigo-700 hover:from-blue-700 hover:to-indigo-800 dark:from-blue-500 dark:to-indigo-600 dark:hover:from-blue-600 dark:hover:to-indigo-700 text-white font-bold py-5 px-6 rounded-2xl shadow-xl shadow-blue-500/30 transition-all active:scale-95 flex items-center justify-center gap-3 text-xl tracking-wide group border border-blue-500 dark:border-blue-400">
                Start Survey <ChevronRight className="w-7 h-7 group-hover:translate-x-1 transition-transform" />
              </button>
            </div>
          </div>
        </div>
      );
    }

    function SuccessModal({ onClose }) {
      return (
        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4 animate-in fade-in duration-300">
          <div className="bg-white dark:bg-slate-800 p-8 sm:p-12 rounded-[2rem] shadow-2xl max-w-lg w-full text-center border border-slate-200 dark:border-slate-700 animate-in zoom-in-95 duration-500 transition-colors">
            <div className="w-24 h-24 bg-green-100 dark:bg-green-900/40 text-green-600 dark:text-green-400 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner">
              <Check className="w-12 h-12" />
            </div>
            <h3 className="text-3xl font-black text-slate-900 dark:text-white mb-4 font-serif">Thank You!</h3>
            <p className="text-slate-600 dark:text-slate-300 text-lg mb-8 leading-relaxed">
              Your feedback is invaluable to us. We have securely received your responses and will use them to continuously elevate the quality of care and service at Taytay Doctors Multispecialty Hospital.
            </p>
            <button onClick={onClose} className="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-bold py-4 px-6 rounded-2xl transition-all shadow-md active:scale-95 text-lg border border-blue-500">
              Return to Home
            </button>
          </div>
        </div>
      )
    }

    function LoginSelectView({ setView, setActiveDeptId, departments, flatDepartments, setAuthUser, setLoginToast }) {
      const [selectedDept, setSelectedDept] = useState(flatDepartments[0].id);
      const [loginType, setLoginType] = useState(null); 
      const [password, setPassword] = useState('');
      const [error, setError] = useState('');
      const [isAuthenticating, setIsAuthenticating] = useState(false);

      const handleLogin = async (e) => {
        e.preventDefault();
        setIsAuthenticating(true);
        setError('');
        
        const id = loginType === 'admin' ? 'admin' : selectedDept;
        const name = loginType === 'admin' ? 'Master Admin' : flatDepartments.find(d => d.id === selectedDept)?.title;
        
        try {
          const url = `${APPS_SCRIPT_URL}?action=login&id=${encodeURIComponent(id)}&name=${encodeURIComponent(name)}&password=${encodeURIComponent(password)}`;
          const res = await fetch(url);
          const data = await res.json();
          
          if (data.success) {
              setError('');
              const userObj = { role: loginType, id: id, name: name };
              setAuthUser(userObj);
              localStorage.setItem('tdmh_auth', JSON.stringify(userObj));
              
              setLoginToast(`Successfully logged in as ${name}`);
              setTimeout(() => setLoginToast(null), 4000);

              if (loginType === 'admin') setView('admin'); else { setActiveDeptId(selectedDept); setView('dept'); }
          } else {
              setError(data.message || 'Incorrect Password');
          }
        } catch (err) {
          console.error("Login fetch error:", err);
          setError('Network error connecting to database.');
        }
        
        setIsAuthenticating(false);
      };

      if (loginType) {
         return (
           <div className="flex flex-col items-center justify-center min-h-[60vh] animate-in fade-in duration-300">
             <div className="bg-white dark:bg-slate-800 p-8 rounded-[2rem] shadow-xl max-w-md w-full border border-slate-100 dark:border-slate-700 relative transition-colors">
                <button onClick={() => {setLoginType(null); setPassword(''); setError('');}} className="absolute top-6 left-6 text-slate-400 dark:text-slate-500 hover:text-slate-600 dark:hover:text-slate-300 transition-colors"><ArrowLeft className="w-6 h-6"/></button>
                <div className="flex justify-center mb-4">{loginType === 'admin' ? <LayoutDashboard className="w-10 h-10 text-slate-700 dark:text-slate-300" /> : <BarChart className="w-10 h-10 text-blue-600 dark:text-blue-400" />}</div>
                <h2 className="text-2xl font-bold text-slate-800 dark:text-white mb-2 text-center">{loginType === 'admin' ? 'Master Admin' : flatDepartments.find(d=>d.id===selectedDept)?.title}</h2>
                <p className="text-center text-slate-500 dark:text-slate-400 mb-8">Enter secure password to continue.</p>
                <form onSubmit={handleLogin} className="space-y-4">
                  <input type="password" value={password} onChange={e => setPassword(e.target.value)} disabled={isAuthenticating} className="w-full p-4 border-2 border-slate-200 dark:border-slate-700 dark:bg-slate-900 dark:text-white rounded-xl outline-none focus:border-blue-500 font-sans text-lg disabled:opacity-50 transition-colors" placeholder="Enter Password" autoFocus />
                  {error && <p className="text-red-500 dark:text-red-400 text-sm mt-2 font-bold flex items-center gap-1"><AlertTriangle className="w-4 h-4"/>{error}</p>}
                  <button type="submit" disabled={isAuthenticating} className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl text-lg transition-colors active:scale-95 flex justify-center items-center gap-2 disabled:opacity-70 shadow-md">
                    {isAuthenticating ? <><RefreshCw className="w-5 h-5 animate-spin" /> Verifying...</> : 'Unlock Portal'}
                  </button>
                </form>
             </div>
           </div>
         )
      }

      return (
        <div className="flex flex-col items-center justify-center min-h-[60vh] animate-in fade-in duration-300">
          <div className="bg-white dark:bg-slate-800 p-8 sm:p-12 rounded-[2rem] shadow-xl max-w-2xl w-full border border-slate-100 dark:border-slate-700 transition-colors">
            <h2 className="text-2xl font-bold text-slate-800 dark:text-white mb-8 text-center flex items-center justify-center gap-3"><Lock className="w-6 h-6 text-blue-600 dark:text-blue-400" /> Staff Access Portal</h2>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
              <div className="bg-slate-50 dark:bg-slate-900/50 p-8 rounded-3xl border border-slate-200 dark:border-slate-700 flex flex-col items-center text-center hover:shadow-md transition-shadow cursor-pointer group" onClick={() => setLoginType('admin')}>
                <LayoutDashboard className="w-12 h-12 text-slate-700 dark:text-slate-300 mb-4 group-hover:scale-110 transition-transform" />
                <h3 className="font-bold text-lg text-slate-800 dark:text-white mb-2">Main Administration</h3>
                <p className="text-sm text-slate-500 dark:text-slate-400 mb-6">Access facility-wide scores, analytics, and edit departments.</p>
                <button className="mt-auto w-full bg-slate-800 dark:bg-slate-700 text-white font-bold py-3 px-4 rounded-xl shadow-sm">Enter Master Portal</button>
              </div>
              <div className="bg-blue-50 dark:bg-blue-900/20 p-8 rounded-3xl border border-blue-200 dark:border-blue-800/50 flex flex-col items-center text-center hover:shadow-md transition-shadow">
                <BarChart className="w-12 h-12 text-blue-600 dark:text-blue-400 mb-4" />
                <h3 className="font-bold text-lg text-blue-900 dark:text-blue-300 mb-2">Department Heads</h3>
                <p className="text-sm text-blue-700/80 dark:text-blue-400/80 mb-6">View isolated reports and charts for your unit.</p>
                <select className="w-full mb-4 p-3 rounded-xl border border-blue-300 dark:border-blue-700 bg-white dark:bg-slate-900 dark:text-white font-medium outline-none focus:ring-2 focus:ring-blue-500 transition-colors" value={selectedDept} onChange={(e) => setSelectedDept(e.target.value)}>
                  {flatDepartments.map(d => <option key={d.id} value={d.id}>{d.type === 'sub' ? `— ${d.title}` : d.title}</option>)}
                </select>
                <button onClick={() => setLoginType('dept')} className="mt-auto w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl transition-colors shadow-sm">View Dept Report</button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    function DrillDownModal({ drillDown, setDrillDown }) {
      const { type, data, questionText, viewMonth } = drillDown;
      
      return (
        <div className="fixed inset-0 z-[60] flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4 animate-in fade-in duration-200 no-print-bg">
          <div className="bg-white dark:bg-slate-800 rounded-[2rem] shadow-2xl max-w-4xl w-full max-h-[90vh] flex flex-col overflow-hidden print-modal-content print:h-auto print:max-h-none print:shadow-none print:rounded-none border border-slate-200 dark:border-slate-700 transition-colors">
            
            <div className="bg-slate-900 dark:bg-slate-950 p-6 flex justify-between items-center text-white shrink-0">
              <div>
                <h3 className="font-bold text-xl font-serif">Detailed Insight</h3>
                <p className="text-slate-400 text-sm mt-1">{questionText}</p>
              </div>
              <div className="flex gap-4 items-center">
                <button onClick={() => window.print()} className="bg-slate-700 hover:bg-slate-600 px-4 py-2 rounded-xl text-sm font-bold flex items-center gap-2 no-print"><Printer className="w-4 h-4" /> Print</button>
                <button onClick={() => setDrillDown(null)} className="text-slate-400 hover:text-white transition-colors no-print"><X className="w-6 h-6" /></button>
              </div>
            </div>

            <div className="p-8 overflow-y-auto custom-scrollbar print:overflow-visible font-sans bg-slate-50 dark:bg-slate-900 transition-colors">
              {type === 'general_question' && (
                 viewMonth ? (
                   <div className="space-y-6">
                      <div className="flex items-center gap-4 mb-6">
                        <button onClick={() => setDrillDown({...drillDown, viewMonth: null})} className="text-slate-500 dark:text-slate-400 hover:text-slate-800 dark:hover:text-white bg-slate-200 dark:bg-slate-800 p-2 rounded-lg no-print transition-colors"><ArrowLeft className="w-5 h-5"/></button>
                        <h4 className="text-2xl font-black text-slate-800 dark:text-white font-serif">Responses for {viewMonth}</h4>
                      </div>
                      {data.monthly[viewMonth].responses.length === 0 ? <p className="text-slate-500 dark:text-slate-400 italic">No detailed responses found.</p> : (
                        <div className="grid grid-cols-1 gap-4">
                          {data.monthly[viewMonth].responses.map((resp, i) => (
                            <div key={i} className="bg-white dark:bg-slate-800 p-5 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm">
                              <div className="text-xs text-slate-400 dark:text-slate-500 font-bold mb-2 uppercase">{new Date(resp.date).toLocaleString()}</div>
                              {resp.isText ? (
                                <p className="text-slate-800 dark:text-slate-200 font-medium text-lg">"{resp.value}"</p>
                              ) : (
                                <div className={`inline-block px-4 py-2 rounded-lg font-black text-lg ${resp.value === 'Yes' ? 'bg-blue-100 dark:bg-blue-900/50 text-blue-800 dark:text-blue-300' : 'bg-slate-100 dark:bg-slate-700 text-slate-800 dark:text-slate-300'}`}>{resp.value}</div>
                              )}
                            </div>
                          ))}
                        </div>
                      )}
                   </div>
                 ) : (
                   <div>
                      <h4 className="text-2xl font-black text-slate-800 dark:text-white font-serif mb-6">Monthly Breakdown</h4>
                      <div className="space-y-4">
                        {Object.keys(data.monthly).sort().reverse().map(monthStr => {
                          const mData = data.monthly[monthStr];
                          return (
                            <div key={monthStr} onClick={() => setDrillDown({...drillDown, viewMonth: monthStr})} className="bg-white dark:bg-slate-800 border-2 border-slate-100 dark:border-slate-700 hover:border-blue-300 dark:hover:border-blue-500 p-6 rounded-2xl cursor-pointer transition-colors shadow-sm group">
                              <div className="flex justify-between items-center">
                                <span className="font-bold text-xl text-slate-700 dark:text-slate-200">{monthStr}</span>
                                <span className="text-sm font-bold text-blue-600 dark:text-blue-400 bg-blue-50 dark:bg-blue-900/30 px-3 py-1 rounded-full group-hover:bg-blue-100 dark:group-hover:bg-blue-900/60 no-print transition-colors">View Responses <ChevronRight className="w-4 h-4 inline" /></span>
                              </div>
                              {!mData.isText && (
                                <div className="flex gap-8 mt-4">
                                  <div className="flex items-center gap-2 text-lg"><span className="w-4 h-4 rounded-full bg-blue-500 block shadow-inner"></span> <span className="font-bold dark:text-slate-300">{mData.Yes || 0} Yes</span></div>
                                  <div className="flex items-center gap-2 text-lg"><span className="w-4 h-4 rounded-full bg-slate-300 dark:bg-slate-600 block shadow-inner"></span> <span className="font-bold text-slate-500 dark:text-slate-400">{mData.No || 0} No</span></div>
                                </div>
                              )}
                              {mData.isText && <div className="mt-4 text-slate-500 dark:text-slate-400 font-medium">{mData.responses.length} written responses recorded.</div>}
                            </div>
                          )
                        })}
                      </div>
                   </div>
                 )
              )}
            </div>
          </div>
        </div>
      )
    }

    function PatientSurvey({ onSubmit, intakeQuestions, activeDepartments, departments, isSubmitting, setView }) {
      const availableDepartments = departments.filter(dept => activeDepartments[dept.id]);
      
      const [surveyData, setSurveyData] = useState({
         general: {},
         departments: availableDepartments.reduce((acc, dept) => {
            acc[dept.id] = {
              skipped: true,
              selectedServices: [],
              answers: {},
              comments: {},
              comment: "" 
            };
            return acc;
         }, {})
      });

      const handleIntakeChange = (e) => {
        setSurveyData(prev => ({ ...prev, general: { ...prev.general, [e.target.name]: e.target.value } }));
      };

      const handleRating = (deptId, qId, score) => {
        setSurveyData(prev => ({
          ...prev,
          departments: {
            ...prev.departments,
            [deptId]: {
              ...prev.departments[deptId],
              skipped: false,
              answers: { ...prev.departments[deptId]?.answers, [qId]: score }
            }
          }
        }));
      };

      const handleComment = (deptId, text) => {
        setSurveyData(prev => ({
          ...prev,
          departments: {
            ...prev.departments,
            [deptId]: { ...prev.departments[deptId], comment: text }
          }
        }));
      };

      const handleServiceRating = (deptId, service, score) => {
        setSurveyData(prev => ({
          ...prev,
          departments: {
             ...prev.departments,
             [deptId]: {
                ...prev.departments[deptId],
                skipped: false,
                answers: { ...prev.departments[deptId]?.answers, [service]: score }
             }
          }
        }));
      };

      const handleServiceComment = (deptId, service, text) => {
        setSurveyData(prev => ({
          ...prev,
          departments: {
             ...prev.departments,
             [deptId]: {
                ...prev.departments[deptId],
                comments: { ...prev.departments[deptId]?.comments, [service]: text }
             }
          }
        }));
      };

      const toggleService = (deptId, service) => {
        setSurveyData(prev => {
          const currentServices = prev.departments[deptId]?.selectedServices || [];
          const newServices = currentServices.includes(service) 
              ? currentServices.filter(s => s !== service) 
              : [...currentServices, service];
          
          const newAnswers = { ...prev.departments[deptId]?.answers };
          const newComments = { ...prev.departments[deptId]?.comments };
          if (!newServices.includes(service)) {
             delete newAnswers[service];
             delete newComments[service];
          }

          return {
             ...prev,
             departments: {
                ...prev.departments,
                [deptId]: { 
                   ...prev.departments[deptId], 
                   selectedServices: newServices,
                   answers: newAnswers,
                   comments: newComments
                }
             }
          }
        });
      };

      const handleSubmit = (e) => {
        e.preventDefault();
        
        const flattenedDepartments = {};

        Object.keys(surveyData.departments).forEach(deptId => {
            const dData = surveyData.departments[deptId];
            const deptDef = departments.find(d => d.id === deptId);

            if (deptDef && deptDef.type === 'checkbox') {
                if (dData.selectedServices && dData.selectedServices.length > 0) {
                    let hasRatings = false;
                    dData.selectedServices.forEach(svc => {
                        if (dData.answers && dData.answers[svc]) {
                            hasRatings = true;
                            const virtualId = `${deptId}_${svc}`;
                            flattenedDepartments[virtualId] = {
                                title: `${deptDef.title} (${svc})`,
                                skipped: false,
                                selectedServices: [svc],
                                answers: { "q1": dData.answers[svc] },
                                comment: dData.comments ? dData.comments[svc] || "" : ""
                            };
                        }
                    });
                    
                    if (!hasRatings) {
                        flattenedDepartments[deptId] = { title: deptDef.title, skipped: true, selectedServices: dData.selectedServices };
                    }
                } else {
                    flattenedDepartments[deptId] = { title: deptDef.title, skipped: true, selectedServices: [] };
                }
            } else {
                if (Object.keys(dData.answers || {}).length === 0) {
                    dData.skipped = true;
                }
                flattenedDepartments[deptId] = dData;
            }
        });

        onSubmit({
           general: surveyData.general,
           departments: flattenedDepartments,
           intakeQuestions: intakeQuestions
        });
      };

      return (
        <div className="max-w-4xl mx-auto animate-in fade-in duration-500 font-sans">
          
          <form onSubmit={handleSubmit} className="space-y-6 sm:space-y-10 pb-20">
            
            {/* INTAKE SECTION */}
            <div className="bg-white/95 dark:bg-slate-800/95 sm:rounded-[2rem] shadow-xl overflow-hidden border-t-8 border-blue-600 dark:border-blue-500 sm:border sm:border-white/50 dark:sm:border-slate-700/50 backdrop-blur-md">
              <div className="bg-blue-50 dark:bg-slate-900/50 p-6 sm:p-10 border-b border-blue-100 dark:border-slate-700 flex items-center justify-between">
                <div>
                  <h2 className="text-2xl sm:text-3xl font-bold font-serif text-blue-900 dark:text-blue-300">Patient Details</h2>
                  <p className="text-blue-700 dark:text-blue-400/80 mt-1">Please provide your visit information.</p>
                </div>
                <button type="button" onClick={() => setView('home')} className="text-sm font-bold text-slate-400 dark:text-slate-400 hover:text-slate-700 dark:hover:text-white bg-white dark:bg-slate-800 px-4 py-2 rounded-xl shadow-sm border border-slate-200 dark:border-slate-700 flex items-center gap-2 transition-colors"><X className="w-4 h-4"/> Cancel</button>
              </div>
              <div className="p-6 sm:p-10 grid grid-cols-1 md:grid-cols-2 gap-6">
                {intakeQuestions.map((q) => (
                  <div key={q.id} className="space-y-3">
                    <label className="block text-slate-700 dark:text-slate-300 font-bold text-lg">{q.text} {q.required && <span className="text-red-500 dark:text-red-400">*</span>}</label>
                    <input 
                       type={q.type === 'date' ? 'date' : 'text'} 
                       name={q.id} 
                       required={q.required} 
                       onChange={handleIntakeChange} 
                       className="w-full border-2 border-slate-200 dark:border-slate-700 rounded-xl p-4 focus:ring-2 focus:ring-blue-200 dark:focus:ring-blue-800 focus:border-blue-500 dark:focus:border-blue-500 outline-none font-medium text-slate-700 dark:text-white bg-slate-50 dark:bg-slate-900/50 focus:bg-white dark:focus:bg-slate-900 transition-colors" 
                    />
                  </div>
                ))}
              </div>
            </div>

            {/* DEPARTMENTS SECTION */}
            <div className="px-4 sm:px-0 space-y-4 sm:space-y-8">
              <div className="text-center py-6">
                 <h2 className="text-3xl sm:text-4xl font-black text-slate-800 dark:text-white font-serif mb-3">Rate Your Experience</h2>
                 <p className="text-slate-500 dark:text-slate-400 text-lg">Tap the face that best describes your experience. <br className="hidden sm:block"/> <span className="font-bold text-blue-600 dark:text-blue-400">Skip any departments you did not visit.</span></p>
              </div>

              {availableDepartments.map((dept) => (
                <div key={dept.id} className="bg-white dark:bg-slate-800 sm:rounded-[2rem] shadow-lg border border-slate-200 dark:border-slate-700 overflow-hidden transform transition-all hover:shadow-xl -mx-4 sm:mx-0">
                  <div className="bg-slate-900 dark:bg-slate-950 text-white p-5 sm:p-6 font-bold text-xl flex items-center gap-3">
                     <Star className="w-6 h-6 text-amber-400" /> {dept.title}
                  </div>
                  <div className="p-5 sm:p-8 space-y-8">
                    
                    {dept.type === 'checkbox' && (
                      <div className="space-y-6">
                         <div className="bg-blue-50/50 dark:bg-slate-900/50 p-6 rounded-2xl border border-blue-100 dark:border-slate-700">
                           <p className="font-bold text-slate-700 dark:text-slate-300 mb-4 text-lg">Please tick/check all the services you have encountered:</p>
                           <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                             {(dept.services || []).map(service => {
                               const isChecked = surveyData.departments[dept.id]?.selectedServices?.includes(service);
                               return (
                                 <div key={service} onClick={() => toggleService(dept.id, service)} className={`flex items-center gap-4 p-4 rounded-xl border-2 cursor-pointer transition-all ${isChecked ? 'bg-blue-600 border-blue-600 text-white shadow-md' : 'bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-600 text-slate-600 dark:text-slate-300 hover:border-blue-300 dark:hover:border-blue-500'}`}>
                                   <div className={`w-8 h-8 rounded-lg border-2 flex items-center justify-center shrink-0 transition-colors ${isChecked ? 'border-white bg-blue-500' : 'border-slate-300 dark:border-slate-500 bg-slate-50 dark:bg-slate-700'}`}>
                                      {isChecked && <Check className="w-5 h-5 text-white" />}
                                   </div>
                                   <span className="font-bold text-lg">{service}</span>
                                 </div>
                               )
                             })}
                           </div>
                         </div>
                         
                         {surveyData.departments[dept.id]?.selectedServices?.map(svc => {
                            const ans = surveyData.departments[dept.id]?.answers?.[svc];
                            return (
                              <div key={svc} className="bg-white dark:bg-slate-800 p-6 sm:p-8 rounded-2xl border border-slate-200 dark:border-slate-700 shadow-sm animate-in fade-in slide-in-from-top-4">
                                 <p className="text-xl sm:text-2xl font-bold text-slate-800 dark:text-white leading-snug mb-6">How was your experience with <span className="text-blue-600 dark:text-blue-400">{svc}</span> and the staff(s)?</p>
                                 <div className="flex justify-between sm:justify-start sm:gap-6">
                                    <button type="button" onClick={() => handleServiceRating(dept.id, svc, 3)} className={`flex-1 sm:flex-none sm:w-32 flex flex-col items-center gap-2 p-4 sm:p-6 rounded-2xl border-4 transition-all active:scale-95 ${ans === 3 ? 'bg-green-500 border-green-500 text-white shadow-lg scale-105' : 'bg-white dark:bg-slate-800 border-slate-100 dark:border-slate-700 text-slate-400 dark:text-slate-500 hover:border-green-200 dark:hover:border-green-800 hover:bg-green-50 dark:hover:bg-green-900/20'}`}>
                                      <span className="text-5xl sm:text-6xl drop-shadow-sm">😁</span>
                                      <span className="font-black tracking-wide text-sm sm:text-base">Happy</span>
                                    </button>
                                    <button type="button" onClick={() => handleServiceRating(dept.id, svc, 2)} className={`flex-1 sm:flex-none sm:w-32 flex flex-col items-center gap-2 p-4 sm:p-6 rounded-2xl border-4 transition-all active:scale-95 ${ans === 2 ? 'bg-yellow-400 border-yellow-400 text-white shadow-lg scale-105' : 'bg-white dark:bg-slate-800 border-slate-100 dark:border-slate-700 text-slate-400 dark:text-slate-500 hover:border-yellow-200 dark:hover:border-yellow-800 hover:bg-yellow-50 dark:hover:bg-yellow-900/20'}`}>
                                      <span className="text-5xl sm:text-6xl drop-shadow-sm">😐</span>
                                      <span className="font-black tracking-wide text-sm sm:text-base">Neutral</span>
                                    </button>
                                    <button type="button" onClick={() => handleServiceRating(dept.id, svc, 1)} className={`flex-1 sm:flex-none sm:w-32 flex flex-col items-center gap-2 p-4 sm:p-6 rounded-2xl border-4 transition-all active:scale-95 ${ans === 1 ? 'bg-red-500 border-red-500 text-white shadow-lg scale-105' : 'bg-white dark:bg-slate-800 border-slate-100 dark:border-slate-700 text-slate-400 dark:text-slate-500 hover:border-red-200 dark:hover:border-red-900 hover:bg-red-50 dark:hover:bg-red-900/20'}`}>
                                      <span className="text-5xl sm:text-6xl drop-shadow-sm">😢</span>
                                      <span className="font-black tracking-wide text-sm sm:text-base">Sad</span>
                                    </button>
                                 </div>
                                 <div className="pt-6 mt-6 border-t border-slate-100 dark:border-slate-700 animate-in fade-in slide-in-from-top-4">
                                   <textarea 
                                      onChange={(e) => handleServiceComment(dept.id, svc, e.target.value)} 
                                      className="w-full border-2 border-slate-200 dark:border-slate-700 focus:border-blue-400 dark:focus:border-blue-500 rounded-2xl p-4 sm:p-5 outline-none resize-none bg-slate-50 dark:bg-slate-900/50 focus:bg-white dark:focus:bg-slate-900 text-slate-700 dark:text-white font-medium transition-colors" 
                                      rows="2" 
                                      placeholder={`Any comments or suggestions for ${svc}? (Optional)`}
                                   ></textarea>
                                 </div>
                              </div>
                            )
                         })}
                      </div>
                    )}

                    {dept.type !== 'checkbox' && (dept.questions || []).map((q) => {
                      const ans = surveyData.departments[dept.id]?.answers?.[q.id];
                      return (
                        <div key={q.id} className="space-y-6">
                          <p className="text-xl sm:text-2xl font-bold text-slate-800 dark:text-white leading-snug">{q.text}</p>
                          <div className="flex justify-between sm:justify-start sm:gap-6">
                            
                            <button type="button" onClick={() => handleRating(dept.id, q.id, 3)} className={`flex-1 sm:flex-none sm:w-32 flex flex-col items-center gap-2 p-4 sm:p-6 rounded-2xl border-4 transition-all active:scale-95 ${ans === 3 ? 'bg-green-500 border-green-500 text-white shadow-lg scale-105' : 'bg-white dark:bg-slate-800 border-slate-100 dark:border-slate-700 text-slate-400 dark:text-slate-500 hover:border-green-200 dark:hover:border-green-800 hover:bg-green-50 dark:hover:bg-green-900/20'}`}>
                              <span className="text-5xl sm:text-6xl drop-shadow-sm">😁</span>
                              <span className="font-black tracking-wide text-sm sm:text-base">Happy</span>
                            </button>

                            <button type="button" onClick={() => handleRating(dept.id, q.id, 2)} className={`flex-1 sm:flex-none sm:w-32 flex flex-col items-center gap-2 p-4 sm:p-6 rounded-2xl border-4 transition-all active:scale-95 ${ans === 2 ? 'bg-yellow-400 border-yellow-400 text-white shadow-lg scale-105' : 'bg-white dark:bg-slate-800 border-slate-100 dark:border-slate-700 text-slate-400 dark:text-slate-500 hover:border-yellow-200 dark:hover:border-yellow-800 hover:bg-yellow-50 dark:hover:bg-yellow-900/20'}`}>
                              <span className="text-5xl sm:text-6xl drop-shadow-sm">😐</span>
                              <span className="font-black tracking-wide text-sm sm:text-base">Neutral</span>
                            </button>

                            <button type="button" onClick={() => handleRating(dept.id, q.id, 1)} className={`flex-1 sm:flex-none sm:w-32 flex flex-col items-center gap-2 p-4 sm:p-6 rounded-2xl border-4 transition-all active:scale-95 ${ans === 1 ? 'bg-red-500 border-red-500 text-white shadow-lg scale-105' : 'bg-white dark:bg-slate-800 border-slate-100 dark:border-slate-700 text-slate-400 dark:text-slate-500 hover:border-red-200 dark:hover:border-red-900 hover:bg-red-50 dark:hover:bg-red-900/20'}`}>
                              <span className="text-5xl sm:text-6xl drop-shadow-sm">😢</span>
                              <span className="font-black tracking-wide text-sm sm:text-base">Sad</span>
                            </button>

                          </div>
                        </div>
                      )
                    })}

                    {dept.type !== 'checkbox' && (
                      <div className="pt-4 border-t border-slate-100 dark:border-slate-700 animate-in fade-in slide-in-from-top-4">
                        <textarea 
                           onChange={(e) => handleComment(dept.id, e.target.value)} 
                           className="w-full border-2 border-slate-200 dark:border-slate-700 focus:border-blue-400 dark:focus:border-blue-500 rounded-2xl p-4 sm:p-5 outline-none resize-none bg-slate-50 dark:bg-slate-900/50 focus:bg-white dark:focus:bg-slate-900 text-slate-700 dark:text-white font-medium transition-colors" 
                           rows="2" 
                           placeholder={`Any comments or suggestions for ${dept.title}? (Optional)`}
                        ></textarea>
                      </div>
                    )}

                  </div>
                </div>
              ))}
            </div>

            {/* OVERALL EXPERIENCE */}
            <div className="bg-slate-900 dark:bg-slate-950 text-white sm:rounded-[2rem] shadow-2xl overflow-hidden -mx-4 sm:mx-0 mt-12 border border-slate-800 dark:border-slate-800">
              <div className="p-6 sm:p-10 border-b border-slate-800 text-center">
                <h2 className="text-3xl sm:text-4xl font-black font-serif">Overall Experience</h2>
                <p className="text-slate-400 mt-2 text-lg">Help us understand the bigger picture.</p>
              </div>
              <div className="p-6 sm:p-10 space-y-8 bg-slate-800/50 dark:bg-slate-900/50">
                {GENERAL_QUESTIONS.map((q) => (
                  <div key={q.id} className="space-y-4 bg-slate-900/80 p-6 rounded-2xl border border-slate-700">
                    <label className="block text-white font-bold text-lg leading-snug">
                      {q.text} {q.required && <span className="text-red-400">*</span>}
                    </label>
                    {q.type === 'yesno' ? (
                      <div className="flex gap-4">
                        <label className="flex items-center justify-center gap-2 cursor-pointer bg-slate-800 hover:bg-blue-900 border-2 border-slate-700 hover:border-blue-500 py-4 px-6 rounded-xl flex-1 transition-all shadow-sm"><input type="radio" name={q.id} value="Yes" required={q.required} onChange={handleIntakeChange} className="w-5 h-5 accent-blue-500" /><span className="font-bold text-white text-lg">Yes</span></label>
                        <label className="flex items-center justify-center gap-2 cursor-pointer bg-slate-800 hover:bg-slate-700 border-2 border-slate-700 hover:border-slate-500 py-4 px-6 rounded-xl flex-1 transition-all shadow-sm"><input type="radio" name={q.id} value="No" required={q.required} onChange={handleIntakeChange} className="w-5 h-5 accent-slate-500" /><span className="font-bold text-white text-lg">No</span></label>
                      </div>
                    ) : q.type === 'compare' ? (
                      <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
                        <label className="flex flex-col items-center justify-center gap-2 cursor-pointer bg-slate-800 hover:bg-green-900 border-2 border-slate-700 hover:border-green-500 p-4 rounded-xl transition-all shadow-sm group">
                          <input type="radio" name={q.id} value="Superior" required={q.required} onChange={handleIntakeChange} className="w-5 h-5 accent-green-500 mb-2" />
                          <span className="font-bold text-white text-lg">Superior</span>
                        </label>
                        <label className="flex flex-col items-center justify-center gap-2 cursor-pointer bg-slate-800 hover:bg-yellow-900 border-2 border-slate-700 hover:border-yellow-500 p-4 rounded-xl transition-all shadow-sm group">
                          <input type="radio" name={q.id} value="At Par" required={q.required} onChange={handleIntakeChange} className="w-5 h-5 accent-yellow-500 mb-2" />
                          <span className="font-bold text-white text-lg">At Par</span>
                        </label>
                        <label className="flex flex-col items-center justify-center gap-2 cursor-pointer bg-slate-800 hover:bg-red-900 border-2 border-slate-700 hover:border-red-500 p-4 rounded-xl transition-all shadow-sm group">
                          <input type="radio" name={q.id} value="Inferior" required={q.required} onChange={handleIntakeChange} className="w-5 h-5 accent-red-500 mb-2" />
                          <span className="font-bold text-white text-lg">Inferior</span>
                        </label>
                      </div>
                    ) : ( 
                      <textarea name={q.id} rows={3} required={q.required} onChange={handleIntakeChange} className="w-full border-2 border-slate-700 rounded-xl p-4 outline-none resize-none font-medium text-white bg-slate-800 focus:border-blue-500 focus:bg-slate-900 transition-colors" placeholder="Type your answer here..."></textarea> 
                    )}
                  </div>
                ))}
                
                <div className="pt-8">
                  <button type="submit" disabled={isSubmitting} className="w-full bg-gradient-to-r from-blue-500 to-indigo-600 hover:from-blue-600 hover:to-indigo-700 text-white font-black py-6 px-6 rounded-2xl shadow-xl transition-all active:scale-95 flex items-center justify-center gap-3 text-2xl disabled:opacity-50 border border-blue-400">
                     {isSubmitting ? 'Submitting securely...' : 'Submit Survey'} <Send className="w-8 h-8" />
                  </button>
                  <p className="text-center text-slate-500 mt-4 text-sm font-bold">Your responses are secure and confidential.</p>
                </div>

              </div>
            </div>

          </form>
        </div>
      );
    }

    function AdminDashboard({ responses, censusData, setCensusData, activeDepartments, setActiveDepartments, departments, setDepartments, flatDepartments, drillDown, setDrillDown, commentCats, setCommentCats, intakeQuestions, setIntakeQuestions, handleHardRefresh }) {
      const [activeTab, setActiveTab] = useState('overview'); 
      const [newDeptName, setNewDeptName] = useState('');
      const [newQuestions, setNewQuestions] = useState({});
      const [newIntakeQ, setNewIntakeQ] = useState('');
      
      const [newServices, setNewServices] = useState({});

      const [isSavingCensus, setIsSavingCensus] = useState(false);
