      const liveDate = new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
      const currentMonthKey = getMonthString(new Date());

      const [draftCensus, setDraftCensus] = useState(censusData[currentMonthKey] || '');
      useEffect(() => {
         setDraftCensus(prev => prev === '' || prev == 0 ? (censusData[currentMonthKey] || '') : prev);
      }, [censusData, currentMonthKey]);

      const handleCensusSave = async () => {
         setIsSavingCensus(true);
         const newData = { ...censusData, [currentMonthKey]: draftCensus };
         setCensusData(newData);
         
         try {
           await fetch(APPS_SCRIPT_URL, {
             method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' },
             body: JSON.stringify({ action: "update_census", monthKey: `'${currentMonthKey}`, censusValue: draftCensus })
           });
           localStorage.setItem('tdmh_census', JSON.stringify(newData));
         } catch(e) { console.error("Error saving census:", e); }
         
         setTimeout(() => { setIsSavingCensus(false); }, 1500);
      }

      const [selectedCommentMonth, setSelectedCommentMonth] = useState(currentMonthKey);
      const [selectedCommentDept, setSelectedCommentDept] = useState('all');

      const analytics = useMemo(() => {
        const currentYear = new Date().getFullYear();
        const allMonthsKeys = Array.from({length: 12}, (_, i) => `${currentYear}-${String(i + 1).padStart(2, '0')}`);

        let totalScore = 0; let totalQuestionsAnswered = 0;
        const deptStats = {};
        
        flatDepartments.forEach(d => deptStats[d.id] = { monthly: {} });
        allMonthsKeys.forEach(mk => {
           flatDepartments.forEach(d => deptStats[d.id].monthly[mk] = { score: 0, count: 0 });
        });
        
        let allCommentsText = "";
        const monthlyResponsesTally = {};
        allMonthsKeys.forEach(mk => monthlyResponsesTally[mk] = 0);

        const genTallies = {};
        GENERAL_QUESTIONS.forEach(q => {
          genTallies[q.id] = { id: q.id, text: q.text, type: q.type, overall: { Yes: 0, No: 0 }, monthly: {} };
        });

        let responsesThisMonthCount = 0;
        
        const structuredComments = {}; 
        flatDepartments.forEach(d => structuredComments[d.id] = {});
        allMonthsKeys.forEach(mk => {
          flatDepartments.forEach(d => structuredComments[d.id][mk] = { comments: [] });
        });

        // Filter responses for the entire CURRENT MONTH for the monitoring tab
        const todaysResponses = responses.filter(r => {
           if(!r || !r.timestamp) return false;
           return getMonthString(new Date(r.timestamp)) === currentMonthKey;
        });

        responses.forEach(res => {
          if (!res || !res.timestamp) return;
          const resMonth = getMonthString(new Date(res.timestamp));
          if (resMonth === currentMonthKey) responsesThisMonthCount++;

          if (monthlyResponsesTally[resMonth] !== undefined) {
             monthlyResponsesTally[resMonth]++;
          }

          if (res.general) {
            GENERAL_QUESTIONS.forEach(q => {
              const ans = res.general[q.id];
              if (!ans) return;
              if (!genTallies[q.id].monthly[resMonth]) genTallies[q.id].monthly[resMonth] = { Yes: 0, No: 0, responses: [], isText: q.type !== 'yesno' && q.type !== 'compare' };

              if (q.type === 'yesno' || q.type === 'compare') {
                if (q.type === 'yesno') {
                   genTallies[q.id].overall[ans]++;
                   genTallies[q.id].monthly[resMonth][ans]++;
                }
                genTallies[q.id].monthly[resMonth].responses.push({ date: res.timestamp, value: ans, isText: false });
              } else {
                 genTallies[q.id].monthly[resMonth].responses.push({ date: res.timestamp, value: ans, isText: true });
              }
            });
          }

          if (!res.departments) return;
          Object.entries(res.departments).forEach(([deptId, data]) => {
            if (!data.skipped && deptStats[deptId] && data.answers) {
              let resScore = 0; let resCount = 0;
              Object.values(data.answers).forEach(score => {
                 const numScore = Number(score) || 0; 
                 resScore += numScore; resCount += 1;
                 totalScore += numScore; totalQuestionsAnswered += 1;
                 if (deptStats[deptId].monthly[resMonth]) {
                   deptStats[deptId].monthly[resMonth].score += numScore;
                   deptStats[deptId].monthly[resMonth].count += 1;
                 }
              });

              const avgResScore = resCount > 0 ? (resScore/resCount) : 0;
              if (data.comment && data.comment.trim() !== '') {
                allCommentsText += " " + data.comment;
                const fallbackTime = new Date(res.timestamp).getTime();
                const uniqueId = `${res.id || fallbackTime}_${deptId}`;
                
                const cObj = { id: uniqueId, text: data.comment, date: res.timestamp, score: avgResScore, room: res.general?.room_number || 'Unknown' };
                if (structuredComments[deptId] && structuredComments[deptId][resMonth]) {
                   structuredComments[deptId][resMonth].comments.push(cObj);
                }
              }
            }
          });
        });

        const fullYearDeptData = flatDepartments.map(d => {
           const monthlyAverages = allMonthsKeys.map(mk => {
              const mStats = deptStats[d.id].monthly[mk];
              const maxPossible = mStats.count * 3;
              const satPct = maxPossible > 0 ? Math.min(Math.round((mStats.score / maxPossible) * 100), 100) : '-';
              return satPct;
           });
           return { id: d.id, title: d.title, monthlyAverages, isSub: d.type === 'sub' };
        });

        const recRate = (genTallies['gen_5'].overall.Yes + genTallies['gen_5'].overall.No) > 0 
          ? Math.round((genTallies['gen_5'].overall.Yes / (genTallies['gen_5'].overall.Yes + genTallies['gen_5'].overall.No)) * 100) : 0;

        const maxResponsesMonthly = Math.max(...Object.values(monthlyResponsesTally), 1); 
        
        const maxTotalPoints = totalQuestionsAnswered * 3;
        const overallSatPct = maxTotalPoints > 0 ? Math.min(Math.round((totalScore / maxTotalPoints) * 100), 100) : 0;

        return { 
          responsesThisMonthCount, allMonthsKeys,
          overallSatPct, 
          recommendationRate: recRate, fullYearDeptData, genTallies, monthlyResponsesTally, maxResponsesMonthly, structuredComments,
          todaysResponses
        };
      }, [responses, flatDepartments, currentMonthKey]);

      const handleAddDepartment = (e) => {
        e.preventDefault(); if(!newDeptName.trim()) return;
        const newId = 'dept_' + Date.now();
        setDepartments([...departments, { id: newId, title: newDeptName.trim(), type: 'standard', questions: [] }]);
        setActiveDepartments({...activeDepartments, [newId]: true}); setNewDeptName('');
      };
      
      const handleAddQuestion = (deptId) => {
        const qText = newQuestions[deptId]; if(!qText || !qText.trim()) return;
        setDepartments(departments.map(d => d.id === deptId ? {...d, questions: [...d.questions, {id: 'q_'+Date.now(), text: qText.trim()}]} : d ));
        setNewQuestions({...newQuestions, [deptId]: ''});
      };

      const handleAddService = (deptId) => {
        const sText = newServices[deptId];
        if(!sText || !sText.trim()) return;
        setDepartments(departments.map(d => 
          d.id === deptId ? {...d, services: [...(d.services || []), sText.trim()]} : d
        ));
        setNewServices({...newServices, [deptId]: ''});
      };

      const handleAddIntakeQuestion = (e) => {
        e.preventDefault();
        if(!newIntakeQ.trim()) return;
        setIntakeQuestions([...intakeQuestions, { id: 'intake_' + Date.now(), text: newIntakeQ.trim(), type: 'short_text', required: false }]);
        setNewIntakeQ('');
      };

      const handleEditIntakeQuestion = (id, newText) => setIntakeQuestions(intakeQuestions.map(q => q.id === id ? { ...q, text: newText } : q));
      const handleDeleteIntakeQuestion = (id) => setIntakeQuestions(intakeQuestions.filter(q => q.id !== id));

      const handleEditQuestion = (deptId, qId, newText) => setDepartments(departments.map(d => d.id === deptId ? { ...d, questions: d.questions.map(q => q.id === qId ? { ...q, text: newText } : q) } : d));
      const handleDeleteQuestion = (deptId, qId) => setDepartments(departments.map(d => d.id === deptId ? { ...d, questions: d.questions.filter(q => q.id !== qId) } : d));

      const handleEditService = (deptId, idx, newText) => setDepartments(departments.map(d => {
         if (d.id === deptId) {
            const updated = [...d.services];
            updated[idx] = newText;
            return { ...d, services: updated };
         }
         return d;
      }));
      const handleDeleteService = (deptId, idx) => setDepartments(departments.map(d => d.id === deptId ? { ...d, services: d.services.filter((_, i) => i !== idx) } : d));

      const currentCensus = parseInt(censusData[currentMonthKey]) || 0;
      const currentResponseRate = currentCensus > 0 ? ((analytics.responsesThisMonthCount / currentCensus) * 100).toFixed(1) : 0;

      let allSelectedComments = [];
      if (selectedCommentDept === 'all') {
         flatDepartments.forEach(d => {
            if (analytics.structuredComments[d.id]?.[selectedCommentMonth]) {
               allSelectedComments = allSelectedComments.concat(analytics.structuredComments[d.id][selectedCommentMonth].comments.map(c => ({...c, deptName: d.title})));
            }
         });
      } else {
         allSelectedComments = (analytics.structuredComments[selectedCommentDept]?.[selectedCommentMonth]?.comments || []).map(c => ({...c, deptName: flatDepartments.find(d=>d.id===selectedCommentDept)?.title}));
      }
      allSelectedComments.sort((a,b) => new Date(b.date) - new Date(a.date));

      return (
        <div className="bg-white/95 dark:bg-slate-900/90 backdrop-blur-md sm:rounded-[2rem] shadow-2xl border border-white dark:border-slate-700/50 overflow-hidden min-h-[75vh] animate-in fade-in duration-500 font-sans print-dashboard relative">
          <div className="bg-white dark:bg-slate-800 text-slate-900 dark:text-white p-6 sm:p-12 border-b border-slate-200 dark:border-slate-700 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 relative overflow-hidden shrink-0 transition-colors">
            <div className="relative z-10 w-full flex justify-between items-center">
              <div>
                <h2 className="text-2xl sm:text-3xl font-black flex items-center gap-3 font-serif text-blue-900 dark:text-blue-300"><LayoutDashboard className="w-8 h-8 text-blue-600 dark:text-blue-400 hidden sm:block" /> Master Admin Portal</h2>
                <p className="text-slate-500 dark:text-slate-400 mt-2 font-medium">Facility-wide analytics, trends, and configurations.</p>
              </div>
              <div className="text-right hidden sm:block">
                 <p className="text-slate-400 font-bold uppercase tracking-wider text-sm mb-1">Today's Date</p>
                 <p className="text-lg font-black text-blue-800 dark:text-blue-300 bg-blue-50 dark:bg-blue-900/40 px-4 py-2 rounded-xl border border-blue-100 dark:border-blue-800">{liveDate}</p>
              </div>
            </div>
          </div>

          <div className="flex border-b border-slate-200 dark:border-slate-700 px-4 sm:px-10 bg-slate-50/80 dark:bg-slate-900/80 overflow-x-auto custom-scrollbar no-print shrink-0 pb-1">
            {['overview', 'monitoring', 'monthly report', 'comments & suggestions', 'question configurations'].map(tab => (
              <button key={tab} onClick={()=>setActiveTab(tab)} className={`whitespace-nowrap py-5 px-4 sm:px-6 font-bold text-sm sm:text-base border-b-4 transition-colors capitalize ${activeTab === tab ? 'border-blue-600 dark:border-blue-400 text-blue-800 dark:text-blue-400' : 'border-transparent text-slate-400 dark:text-slate-500 hover:text-slate-800 dark:hover:text-slate-300'}`}>
                {tab}
              </button>
            ))}
          </div>

          <div className="p-4 sm:p-10">
            
            {/* 1. OVERVIEW TAB */}
            {activeTab === 'overview' && (
              <div className="space-y-12 animate-in slide-in-from-bottom-2">
                
                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                  <div className="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-3xl p-6 shadow-sm hover:border-blue-300 transition-colors relative flex flex-col justify-between">
                    <div>
                      <p className="text-slate-500 dark:text-slate-400 font-bold mb-1 uppercase tracking-wide text-sm">Total Census</p>
                      <p className="text-xs text-slate-400 dark:text-slate-500 mb-2 leading-tight">Total patients admitted or visited (This Month)</p>
                      <p className="text-4xl sm:text-5xl font-black text-slate-800 dark:text-white truncate mb-4">
                        {censusData[currentMonthKey] || 0}
                      </p>
                      
                      <div className="border-t border-slate-100 dark:border-slate-700 pt-4 mt-2">
                        <p className="text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-2">Update Value</p>
                        <div className="flex items-center gap-2">
                          <input 
                              type="number" 
                              min="0"
                              value={draftCensus} 
                              onChange={(e) => setDraftCensus(e.target.value)} 
                              className="text-lg font-bold text-slate-800 dark:text-white w-full border-2 border-slate-200 dark:border-slate-600 focus:border-blue-500 rounded-xl px-3 py-2 outline-none bg-slate-50 dark:bg-slate-900 transition-colors" 
                              placeholder="New census..." 
                          />
                          <button onClick={handleCensusSave} disabled={isSavingCensus || String(draftCensus) === String(censusData[currentMonthKey] || '')} className="flex items-center justify-center bg-blue-600 hover:bg-blue-700 disabled:bg-slate-200 dark:disabled:bg-slate-700 disabled:text-slate-400 text-white p-3 rounded-xl font-bold transition-colors no-print shadow-sm shrink-0" title="Save Census">
                             {isSavingCensus ? <RefreshCw className="w-5 h-5 animate-spin"/> : <Save className="w-5 h-5"/>}
                          </button>
                        </div>
                      </div>
                    </div>
                  </div>
                  <div className="bg-blue-50 dark:bg-blue-900/20 border border-blue-200 dark:border-blue-800/50 rounded-3xl p-6 shadow-sm flex flex-col justify-between">
                    <div>
                      <p className="text-blue-800 dark:text-blue-400 font-bold mb-1 uppercase tracking-wide text-sm">Total Responses</p>
                      <p className="text-xs text-blue-600/70 dark:text-blue-400/70 mb-4 leading-tight">Surveys successfully submitted (This Month)</p>
                      <p className="text-3xl sm:text-4xl lg:text-5xl font-black text-blue-900 dark:text-blue-200 truncate">{analytics.responsesThisMonthCount}</p>
                    </div>
                    <p className="text-[10px] font-bold text-blue-600 dark:text-blue-500 mt-6 uppercase tracking-widest">Automated Count</p>
                  </div>
                  <div className="bg-emerald-50 dark:bg-emerald-900/20 border border-emerald-200 dark:border-emerald-800/50 rounded-3xl p-6 shadow-sm flex flex-col justify-between relative group">
                    <div>
                       <p className="text-emerald-800 dark:text-emerald-400 font-bold mb-1 uppercase tracking-wide text-sm">Response Rate</p>
                       <p className="text-xs text-emerald-600/70 dark:text-emerald-400/70 mb-4 leading-tight">Percentage of patients who answered</p>
                       <p className="text-3xl sm:text-4xl lg:text-5xl font-black text-emerald-900 dark:text-emerald-200 truncate">{currentResponseRate}%</p>
                    </div>
                    <p className="text-[10px] font-bold text-emerald-600 dark:text-emerald-500 mt-6 uppercase tracking-widest">
                       (Total Responses ÷ Total Census)
                    </p>
                  </div>
                  <div className="bg-indigo-50 dark:bg-indigo-900/20 border border-indigo-200 dark:border-indigo-800/50 rounded-3xl p-6 shadow-sm flex flex-col justify-between relative group">
                    <div>
                       <p className="text-indigo-800 dark:text-indigo-400 font-bold mb-1 uppercase tracking-wide text-sm">Satisfaction Rate</p>
                       <p className="text-xs text-indigo-600/70 dark:text-indigo-400/70 mb-4 leading-tight">Overall quality of care rating</p>
                       <p className="text-3xl sm:text-4xl lg:text-5xl font-black text-indigo-900 dark:text-indigo-200 truncate">{analytics.overallSatPct}%</p>
                    </div>
                    <p className="text-[10px] font-bold text-indigo-600 dark:text-indigo-500 mt-6 uppercase tracking-widest">
                       (Points Earned ÷ Max Possible)
                    </p>
                  </div>
                </div>

                <div className="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 p-6 sm:p-10 rounded-[2.5rem] shadow-sm">
                  <h3 className="text-2xl sm:text-3xl font-black text-slate-800 dark:text-white mb-8 flex items-center gap-3 font-serif"><BarChart3 className="w-8 h-8 text-blue-600 dark:text-blue-400" /> Survey Volume (Response Rate %)</h3>
                  <div className="flex items-end justify-between gap-1 sm:gap-4 h-[400px] sm:h-[500px] border-b-4 border-slate-100 dark:border-slate-700 pb-2 relative">
                     {analytics.allMonthsKeys.map((mk, index) => {
                        const count = analytics.monthlyResponsesTally[mk];
                        const mCensus = parseInt(censusData[mk]) || 0;
                        const rate = mCensus > 0 ? ((count / mCensus) * 100).toFixed(0) : 0;
                        const heightPct = mCensus > 0 ? Math.min(rate, 100) : (analytics.maxResponsesMonthly > 0 ? (count / analytics.maxResponsesMonthly) * 100 : 0);
                        const isCurrent = mk === currentMonthKey;
                        
                        return (
                           <div key={mk} className="flex flex-col items-center flex-1 h-full justify-end">
                              <div className={`flex flex-col items-center mb-3`}>
                                 {mCensus > 0 ? (
                                   <>
                                     <span className={`text-base sm:text-xl font-black ${isCurrent ? 'text-indigo-700 dark:text-indigo-400' : 'text-slate-700 dark:text-slate-300'}`}>{count === 0 ? '-' : rate + '%'}</span>
                                     <span className={`text-[10px] sm:text-xs font-bold px-2 py-0.5 rounded-full mt-1 ${isCurrent ? 'bg-indigo-100 dark:bg-indigo-900/50 text-indigo-800 dark:text-indigo-300' : 'bg-slate-100 dark:bg-slate-700 text-slate-500 dark:text-slate-400'}`}>Vol: {count}</span>
                                   </>
                                 ) : (
                                   <>
                                     <span className={`text-base sm:text-xl font-black ${isCurrent ? 'text-indigo-700 dark:text-indigo-400' : 'text-slate-700 dark:text-slate-300'}`}>{count === 0 ? '-' : count}</span>
                                     <span className={`text-[10px] sm:text-xs font-bold px-2 py-0.5 rounded-full mt-1 bg-slate-100 dark:bg-slate-700 text-slate-500 dark:text-slate-400`}>No Census</span>
                                   </>
                                 )}
                              </div>
                              <div className={`w-full max-w-[4rem] rounded-t-xl transition-all duration-1000 ${isCurrent ? 'bg-gradient-to-t from-indigo-500 to-indigo-400 shadow-lg' : 'bg-blue-400 dark:bg-blue-500'}`} style={{ height: `${heightPct}%`, minHeight: count > 0 ? '5%' : '4px' }}></div>
                              <div className={`text-xs sm:text-sm font-black mt-4 uppercase tracking-widest ${isCurrent ? 'text-indigo-600 dark:text-indigo-400' : 'text-slate-400 dark:text-slate-500'}`}>{ALL_MONTHS_LABELS[index]}</div>
                           </div>
                        )
                     })}
                  </div>
                  <div className="mt-8 flex flex-wrap items-center justify-center gap-4 sm:gap-8 text-sm font-bold text-slate-500 dark:text-slate-400 bg-slate-50 dark:bg-slate-900/50 p-4 rounded-2xl border border-slate-100 dark:border-slate-800">
                     <span className="flex items-center gap-3"><div className="w-4 h-4 bg-blue-400 rounded-full shadow-inner"></div> Past Months</span>
                     <span className="flex items-center gap-3"><div className="w-4 h-4 bg-indigo-500 rounded-full shadow-inner"></div> Current Month</span>
                     <span className="flex items-center gap-3"><div className="px-2 py-0.5 bg-slate-200 dark:bg-slate-700 text-slate-600 dark:text-slate-300 rounded text-xs">XX%</div> Response Rate (Count / Census)</span>
                  </div>
                </div>

                <div className="bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 p-6 sm:p-10 rounded-[2.5rem]">
                   <h3 className="text-2xl sm:text-3xl font-black text-slate-800 dark:text-white mb-8 flex items-center gap-3 font-serif"><Star className="w-8 h-8 text-amber-500" /> General Satisfaction Insights</h3>
                   
                   <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-6">
                     {GENERAL_QUESTIONS.filter(q => q.type === 'yesno').map(q => {
                       const tally = analytics.genTallies[q.id];
                       const total = tally.overall.Yes + tally.overall.No;
                       const pctYes = total > 0 ? Math.round((tally.overall.Yes / total) * 100) : 0;
                       
                       return (
                         <div key={q.id} onClick={() => setDrillDown({ type: 'general_question', data: tally, questionText: q.text })} className="bg-white dark:bg-slate-800 p-6 rounded-3xl border border-slate-200 dark:border-slate-700 shadow-sm hover:border-blue-400 dark:hover:border-blue-500 hover:shadow-md cursor-pointer transition-all group flex flex-col justify-between">
                           <p className="text-sm font-bold text-slate-600 dark:text-slate-300 mb-6 h-10 line-clamp-2 leading-relaxed">{q.text}</p>
                           <div className="flex items-center justify-between">
                             <div className="relative w-20 h-20 shrink-0">
                               <svg viewBox="0 0 36 36" className="w-full h-full transform -rotate-90 drop-shadow-sm">
                                 <path className="text-slate-100 dark:text-slate-700" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="currentColor" strokeWidth="4" />
                                 <path className={`${pctYes >= 50 ? 'text-blue-500' : 'text-amber-500'} transition-all duration-1000 ease-out`} strokeDasharray={`${pctYes}, 100`} d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="currentColor" strokeWidth="4" strokeLinecap="round"/>
                               </svg>
                               <div className="absolute inset-0 flex items-center justify-center flex-col">
                                 <span className="text-lg font-black text-slate-700 dark:text-slate-200">{pctYes}%</span>
                               </div>
                             </div>
                             <div className="text-right flex-1 ml-4">
                               <div className="flex items-center justify-end gap-2 mb-2">
                                 <span className="text-lg font-black text-blue-600 dark:text-blue-400">{tally.overall.Yes}</span>
                                 <span className="text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest">Yes</span>
                               </div>
                               <div className="flex items-center justify-end gap-2 mb-3">
                                 <span className="text-lg font-black text-slate-500 dark:text-slate-400">{tally.overall.No}</span>
                                 <span className="text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest">No</span>
                               </div>
                               <div className="w-10 h-10 rounded-full bg-slate-50 dark:bg-slate-700 flex items-center justify-center group-hover:bg-blue-50 dark:group-hover:bg-blue-900/50 text-slate-400 dark:text-slate-400 group-hover:text-blue-600 dark:group-hover:text-blue-400 no-print ml-auto transition-colors shadow-sm border border-slate-100 dark:border-slate-600"><ChevronRight className="w-5 h-5"/></div>
                             </div>
                           </div>
                         </div>
                       )
                     })}
                   </div>
                </div>
              </div>
            )}

            {/* 1.5 MONITORING TAB (UPDATED FOR FULL MONTH) */}
            {activeTab === 'monitoring' && (
               <div className="space-y-6 animate-in slide-in-from-bottom-2">
                  <div className="flex justify-between items-center mb-6">
                     <div>
                        <h3 className="text-2xl sm:text-3xl font-black font-serif flex items-center gap-3 text-slate-800 dark:text-white"><UserCheck className="text-blue-600 dark:text-blue-400 w-8 h-8" /> Live Patient Monitoring</h3>
                        <p className="text-slate-500 dark:text-slate-400 mt-2 font-medium">Track patients who have submitted their surveys <span className="font-bold text-blue-600 dark:text-blue-400">this month</span>.</p>
                     </div>
                  </div>

                  <div className="bg-white dark:bg-slate-800 rounded-[2rem] border border-slate-200 dark:border-slate-700 shadow-sm overflow-hidden">
                     {analytics.todaysResponses.length === 0 ? (
                        <div className="p-10 text-center text-slate-400 dark:text-slate-500 font-bold">
                           <Clock className="w-12 h-12 mx-auto mb-4 opacity-30" />
                           No surveys have been submitted yet this month.
                        </div>
                     ) : (
                        <div className="overflow-x-auto custom-scrollbar">
                           <table className="w-full text-left min-w-[600px]">
                              <thead className="bg-slate-50 dark:bg-slate-900 text-slate-500 dark:text-slate-400 font-black uppercase tracking-wider text-xs border-b border-slate-200 dark:border-slate-700">
                                 <tr>
                                    <th className="p-5">Date & Time Submitted</th>
                                    <th className="p-5">Patient Name</th>
                                    <th className="p-5">Room / Ward</th>
                                    <th className="p-5 text-right">Status</th>
                                 </tr>
                              </thead>
                              <tbody className="divide-y divide-slate-100 dark:divide-slate-700/50 text-slate-700 dark:text-slate-200">
                                 {analytics.todaysResponses.map(r => (
                                    <tr key={r.id} className="hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors">
                                       <td className="p-5 text-sm font-medium">
                                          {new Date(r.timestamp).toLocaleDateString('en-US', {month: 'short', day: 'numeric'})} at {new Date(r.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}
                                       </td>
                                       <td className="p-5 font-black text-lg">{r.general?.patient_name || 'Anonymous'}</td>
                                       <td className="p-5 font-medium bg-slate-50 dark:bg-slate-900/50">{r.general?.room_number || 'N/A'}</td>
                                       <td className="p-5 text-right"><span className="bg-green-100 dark:bg-green-900/40 text-green-700 dark:text-green-400 border border-green-200 dark:border-green-800/50 px-4 py-1.5 rounded-xl text-xs font-black uppercase tracking-widest inline-flex items-center gap-2"><Check className="w-3 h-3"/> Complete</span></td>
                                    </tr>
                                 ))}
                              </tbody>
                           </table>
                        </div>
                     )}
                  </div>
               </div>
            )}

            {/* 2. MONTHLY COMPARATIVE REPORT TAB */}
            {activeTab === 'monthly report' && (
               <div className="space-y-8 animate-in slide-in-from-bottom-2">
                 <div className="flex flex-col sm:flex-row sm:items-center justify-between mb-8 gap-4">
                   <div>
                     <h3 className="text-3xl font-black text-slate-800 dark:text-white font-serif flex items-center gap-3"><CalendarDays className="w-8 h-8 text-blue-600 dark:text-blue-400" /> Full Year Department Averages</h3>
                     <p className="text-slate-500 dark:text-slate-400 mt-4 font-medium max-w-3xl leading-relaxed bg-blue-50 dark:bg-slate-800 p-4 rounded-xl border border-blue-100 dark:border-slate-700">
                        <strong className="text-slate-800 dark:text-slate-200">How to read this table:</strong> Scores are strictly represented as a <strong className="text-blue-700 dark:text-blue-400">Satisfaction Percentage</strong>. <br/>
                        Calculation: Every rating has a point value (<strong className="text-green-600">😁 Happy = 3 pts</strong>, <strong className="text-yellow-600">😐 Neutral = 2 pts</strong>, <strong className="text-red-600">😢 Sad = 1 pt</strong>). 
                        We divide the Total Points Earned by the Maximum Possible Points to get the percentage. 
                     </p>
                   </div>
                   <button onClick={() => window.print()} className="bg-slate-800 dark:bg-blue-600 text-white px-6 py-3 rounded-xl font-bold flex items-center justify-center gap-2 hover:bg-slate-700 dark:hover:bg-blue-700 shadow-md no-print font-sans"><Printer className="w-5 h-5" /> Print Table</button>
                 </div>

                 <div className="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-3xl shadow-sm overflow-hidden flex flex-col transition-colors">
                   <div className="overflow-x-auto custom-scrollbar pb-2 print:overflow-visible">
                     <table className="w-full text-left border-collapse min-w-[1200px] print:min-w-0 print:w-full">
                       <thead>
                         <tr className="bg-slate-900 dark:bg-slate-950 text-white font-bold text-sm tracking-wide uppercase print:text-[8px] print:bg-transparent print:text-black">
                           <th className="p-5 print:p-1 border-b border-slate-700 print:border-slate-300 sticky left-0 bg-slate-900 dark:bg-slate-950 print:bg-transparent z-10 shadow-[4px_0_10px_-4px_rgba(0,0,0,0.5)] print:shadow-none w-64 print:w-auto">Department Name</th>
                           {ALL_MONTHS_LABELS.map(label => <th key={label} className="p-5 print:p-1 border-b border-slate-700 print:border-slate-300 text-center w-24 print:w-auto">{label}</th>)}
                         </tr>
                       </thead>
                       <tbody className="text-sm font-medium print:text-[9px]">
                         {analytics.fullYearDeptData.map((dept, index) => (
                           <tr key={dept.id} className={`group transition-colors ${index % 2 === 0 ? 'bg-white dark:bg-slate-800 print:bg-transparent' : 'bg-slate-50 dark:bg-slate-800/60 print:bg-transparent'} hover:bg-blue-50/50 dark:hover:bg-blue-900/20`}>
                             <td className={`p-5 print:p-1 sticky left-0 z-10 shadow-[4px_0_10px_-4px_rgba(0,0,0,0.1)] print:shadow-none transition-colors ${dept.isSub ? 'pl-10 print:pl-4 text-slate-600 dark:text-slate-300 print:text-slate-600' : 'font-bold text-slate-800 dark:text-white print:text-black'} ${index % 2 === 0 ? 'bg-white dark:bg-slate-800 print:bg-transparent group-hover:bg-blue-50 dark:group-hover:bg-slate-700' : 'bg-slate-50 dark:bg-slate-800 print:bg-transparent group-hover:bg-blue-50 dark:group-hover:bg-slate-700'}`}>
                                {dept.isSub && <span className="text-slate-400 dark:text-slate-500 print:text-slate-400 mr-2">↳</span>}
                                {dept.title}
                             </td>
                             {dept.monthlyAverages.map((satPct, i) => {
                                const isDash = satPct === '-';
                                const colorClass = isDash ? 'text-slate-300 dark:text-slate-600 print:text-slate-400 font-normal' : satPct < 66 ? 'text-red-600 dark:text-red-400 bg-red-50/30 dark:bg-red-900/10 print:bg-transparent print:text-black' : 'text-blue-700 dark:text-blue-400 bg-blue-50/30 dark:bg-blue-900/10 print:bg-transparent print:text-black';
                                
                                return (
                                  <td key={i} className={`p-4 print:p-1 text-center ${colorClass}`}>
                                     {isDash ? '-' : (
                                       <span className="font-black text-lg print:text-[9px]">{satPct}%</span>
                                     )}
                                  </td>
                                )
                             })}
                           </tr>
                         ))}
                       </tbody>
                     </table>
                   </div>
                 </div>
               </div>
            )}

            {/* 3. COMMENTS & SUGGESTIONS TAB */}
            {activeTab === 'comments & suggestions' && (
               <CommentManager 
                 comments={allSelectedComments} 
                 commentCats={commentCats} 
                 setCommentCats={setCommentCats} 
                 selectedMonth={selectedCommentMonth} 
                 onMonthChange={setSelectedCommentMonth} 
                 monthsList={analytics.allMonthsKeys}
                 showDeptFilter={true}
                 flatDepartments={flatDepartments}
                 selectedDept={selectedCommentDept}
                 onDeptChange={setSelectedCommentDept}
               />
            )}

            {/* 4. SETTINGS & EDITOR TAB */}
            {activeTab === 'question configurations' && (
               <div className="animate-in slide-in-from-bottom-2 space-y-10 no-print">
                 
                 <div className="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-3xl overflow-hidden shadow-sm transition-colors mb-8">
                     <div className="bg-slate-50 dark:bg-slate-800/50 p-6 sm:p-8 border-b border-slate-200 dark:border-slate-700">
                         <span className="font-black text-slate-800 dark:text-white text-xl flex items-center gap-3"><UserCheck className="w-6 h-6 text-slate-400" /> Patient Details (Intake Form)</span>
                     </div>
                     <div className="p-6 sm:p-8 space-y-4">
                         {intakeQuestions.length === 0 ? <p className="text-lg italic text-slate-400">No intake questions configured.</p> : (
                             <div className="space-y-3">
                                 {intakeQuestions.map((q, i) => (
                                     <div key={q.id} className="flex items-center gap-3 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 p-2 rounded-xl shadow-sm">
                                         <span className="text-blue-600 dark:text-blue-400 font-black whitespace-nowrap pl-2">Field {i+1}:</span>
                                         <input type="text" value={q.text} onChange={(e) => handleEditIntakeQuestion(q.id, e.target.value)} className="flex-1 bg-transparent outline-none text-slate-700 dark:text-slate-300 font-medium px-2" />
                                         {q.required && <span className="text-red-400 text-sm font-bold pr-2">* Required</span>}
                                         <button onClick={() => handleDeleteIntakeQuestion(q.id)} className="p-2 text-slate-400 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-900/30 rounded-lg transition-colors" title="Delete Field"><Trash2 className="w-5 h-5"/></button>
                                     </div>
                                 ))}
                             </div>
                         )}
                         <div className="flex flex-col sm:flex-row gap-4 mt-6 border-t border-slate-100 dark:border-slate-700 pt-6">
                             <input type="text" placeholder="Add a new custom patient detail field (e.g. Attending Physician)..." className="flex-1 p-4 rounded-xl border-2 border-slate-200 dark:border-slate-700 dark:bg-slate-900 dark:text-white outline-none focus:border-blue-400 dark:focus:border-blue-500 text-base font-medium transition-colors" value={newIntakeQ} onChange={(e) => setNewIntakeQ(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && handleAddIntakeQuestion(e)} />
                             <button onClick={handleAddIntakeQuestion} className="bg-slate-800 dark:bg-slate-700 text-white px-8 py-4 rounded-xl text-base font-bold hover:bg-slate-700 dark:hover:bg-slate-600 transition-colors shadow-sm">Add Field</button>
                         </div>
                     </div>
                 </div>

                 <form onSubmit={handleAddDepartment} className="bg-blue-50 dark:bg-blue-900/20 border border-blue-200 dark:border-blue-800 p-8 rounded-3xl flex flex-col sm:flex-row gap-6 items-end shadow-sm">
                   <div className="flex-1 w-full"><label className="block text-blue-900 dark:text-blue-300 font-bold mb-3 text-lg">Create New Department</label><input type="text" value={newDeptName} onChange={(e)=>setNewDeptName(e.target.value)} placeholder="e.g. Outpatient Department" className="w-full p-5 rounded-2xl border-2 border-blue-200 dark:border-blue-800 dark:bg-slate-900 dark:text-white outline-none focus:border-blue-500 font-medium text-lg" /></div>
                   <button type="submit" className="w-full sm:w-auto bg-blue-600 hover:bg-blue-700 text-white font-bold px-10 py-5 rounded-2xl flex items-center justify-center gap-2 text-lg shadow-md transition-all active:scale-95"><Plus className="w-6 h-6"/> Add Unit</button>
                 </form>
                 
                 <div className="space-y-6">
                   {departments.map(dept => (
                     <div key={dept.id} className="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-3xl overflow-hidden shadow-sm transition-colors">
                       
                       <div className="bg-slate-50 dark:bg-slate-800/50 p-6 sm:p-8 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-6 border-b border-slate-200 dark:border-slate-700">
                          <span className="font-black text-slate-800 dark:text-white text-xl flex items-center gap-3"><Edit2 className="w-6 h-6 text-slate-400" /> {dept.title}</span>
                          <label className="flex items-center gap-4 cursor-pointer group bg-white dark:bg-slate-700 px-5 py-3 rounded-2xl border border-slate-200 dark:border-slate-600 shadow-sm hover:border-blue-300 dark:hover:border-blue-500 transition-colors">
                            <span className="text-sm font-black text-slate-500 dark:text-slate-300 group-hover:text-slate-800 dark:group-hover:text-white uppercase tracking-wide">Survey Visibility</span>
                            <div className={`w-14 h-7 rounded-full p-1 transition-colors shadow-inner ${activeDepartments[dept.id] ? 'bg-blue-500' : 'bg-slate-300 dark:bg-slate-600'}`}><div className={`w-5 h-5 bg-white rounded-full shadow-md transition-transform ${activeDepartments[dept.id] ? 'translate-x-7' : 'translate-x-0'}`}></div></div>
                            <input type="checkbox" className="hidden" checked={activeDepartments[dept.id]} onChange={() => setActiveDepartments(prev => ({...prev, [dept.id]: !prev[dept.id]}))} />
                          </label>
                       </div>
                       
                       <div className="p-6 sm:p-8 space-y-4">
                         
                         {dept.type === 'checkbox' && (
                           <div className="mb-8 p-6 bg-indigo-50/50 dark:bg-slate-900/80 rounded-2xl border border-indigo-100 dark:border-slate-700">
                             <p className="font-bold text-slate-800 dark:text-slate-200 mb-4 text-lg">Manage Service Tick Boxes:</p>
                             
                             <div className="flex flex-col gap-3 mb-6">
                               {dept.services?.map((svc, i) => (
                                  <div key={i} className="flex items-center gap-3 bg-indigo-100/50 dark:bg-indigo-900/40 border border-indigo-200 dark:border-indigo-800/50 p-2 rounded-xl shadow-sm">
                                      <span className="w-2 h-2 rounded-full bg-indigo-500 ml-2"></span>
                                      <input type="text" value={svc} onChange={(e) => handleEditService(dept.id, i, e.target.value)} className="flex-1 bg-transparent outline-none text-indigo-900 dark:text-indigo-200 font-bold px-2" />
                                      <button onClick={() => handleDeleteService(dept.id, i)} className="p-2 text-indigo-400 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-900/30 rounded-lg transition-colors" title="Delete Service Option"><Trash2 className="w-5 h-5"/></button>
                                  </div>
                               ))}
                             </div>
                             
                             <div className="flex flex-col sm:flex-row gap-3">
                               <input type="text" placeholder="Add a new tick box (e.g. 'Therapy')..." className="flex-1 p-4 rounded-xl border-2 border-slate-200 dark:border-slate-600 dark:bg-slate-950 dark:text-white outline-none focus:border-indigo-400 font-medium transition-colors" value={newServices[dept.id] || ''} onChange={(e) => setNewServices({...newServices, [dept.id]: e.target.value})} onKeyDown={(e) => e.key === 'Enter' && handleAddService(dept.id)} />
                               <button type="button" onClick={() => handleAddService(dept.id)} className="bg-indigo-600 hover:bg-indigo-700 text-white px-8 py-4 rounded-xl text-base font-bold transition-colors shadow-sm">Add Option</button>
                             </div>
                           </div>
                         )}

                         {dept.type !== 'checkbox' && (
                           <>
                             {dept.questions.length === 0 ? <p className="text-lg italic text-slate-400">No questions added yet.</p> : (
                               <div className="space-y-3">
                                 {dept.questions.map((q, i) => (
                                   <div key={q.id} className="flex items-center gap-3 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 p-2 rounded-xl shadow-sm">
                                       <span className="text-blue-600 dark:text-blue-400 font-black whitespace-nowrap pl-2">Q{i+1}:</span>
                                       <input type="text" value={q.text} onChange={(e) => handleEditQuestion(dept.id, q.id, e.target.value)} className="flex-1 bg-transparent outline-none text-slate-700 dark:text-slate-300 font-medium px-2" />
                                       <button onClick={() => handleDeleteQuestion(dept.id, q.id)} className="p-2 text-slate-400 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-900/30 rounded-lg transition-colors" title="Delete Question"><Trash2 className="w-5 h-5"/></button>
                                   </div>
                                 ))}
                               </div>
                             )}
                             <div className="flex flex-col sm:flex-row gap-4 mt-6 border-t border-slate-100 dark:border-slate-700 pt-6">
                               <input type="text" placeholder="Add a new survey question to this unit..." className="flex-1 p-4 rounded-xl border-2 border-slate-200 dark:border-slate-700 dark:bg-slate-900 dark:text-white outline-none focus:border-blue-400 dark:focus:border-blue-500 text-base font-medium transition-colors" value={newQuestions[dept.id] || ''} onChange={(e) => setNewQuestions({...newQuestions, [dept.id]: e.target.value})} onKeyDown={(e) => e.key === 'Enter' && handleAddQuestion(dept.id)} />
                               <button onClick={() => handleAddQuestion(dept.id)} className="bg-slate-800 dark:bg-slate-700 text-white px-8 py-4 rounded-xl text-base font-bold hover:bg-slate-700 dark:hover:bg-slate-600 transition-colors shadow-sm">Add Question</button>
                             </div>
                           </>
                         )}

                       </div>
                     </div>
                   ))}
                 </div>
               </div>
            )}
          </div>
        </div>
      );
    }

    function DepartmentDashboard({ responses, deptId, departments, flatDepartments, commentCats, setCommentCats }) {
      const dept = flatDepartments.find(d => d.id === deptId);
      
      const currentMonthKey = getMonthString(new Date());
      const [selectedMonth, setSelectedMonth] = useState(currentMonthKey);

      const monthlyData = useMemo(() => {
        const currentYear = new Date().getFullYear();
        const allMonthsKeys = Array.from({length: 12}, (_, i) => `${currentYear}-${String(i + 1).padStart(2, '0')}`);
        
        const months = {}; 
        allMonthsKeys.forEach(mk => {
           const d = new Date(mk + "-01");
           months[mk] = { label: d.toLocaleString('default', { month: 'short', year: 'numeric' }), key: mk, totalScore: 0, count: 0, comments: [] };
        });

        responses.forEach(res => {
          if (!res.departments) return;
          
          let localScore = 0; let localCount = 0;
          let commentData = null;

          if (res.departments[deptId] && !res.departments[deptId].skipped && res.departments[deptId].answers) {
             Object.values(res.departments[deptId].answers).forEach(score => {
                localScore += Number(score) || 0; localCount++;
             });
             commentData = res.departments[deptId].comment;
          }

          const origDef = departments.find(d => d.id === deptId);
          if (origDef && origDef.type === 'checkbox') {
             origDef.services.forEach(svc => {
                const subId = `${deptId}_${svc}`;
                if (res.departments[subId] && !res.departments[subId].skipped && res.departments[subId].answers) {
                    Object.values(res.departments[subId].answers).forEach(score => {
                        localScore += Number(score) || 0; localCount++;
                    });
                    if (res.departments[subId].comment) commentData = (commentData ? commentData + " | " : "") + res.departments[subId].comment;
                }
             });
          }

          if (localCount > 0) {
            const dateObj = new Date(res.timestamp);
            const monthKey = getMonthString(dateObj);
            
            if (months[monthKey]) {
                months[monthKey].totalScore += localScore; 
                months[monthKey].count += localCount; 
                
                if (commentData && commentData.trim() !== '') {
                   const avg = (localScore/localCount);
                   const fallbackTime = new Date(res.timestamp).getTime();
                   const uniqueId = `${res.id || fallbackTime}_${deptId}`;
                   
                   const cObj = { id: uniqueId, text: commentData, date: res.timestamp, score: avg, room: res.general?.room_number || 'Unknown' };
                   months[monthKey].comments.push(cObj);
                }
            }
          }
        });

        return allMonthsKeys.map(key => {
          const d = months[key];
          const maxPossible = d.count * 3;
          const satPct = maxPossible > 0 ? Math.min(Math.round((d.totalScore / maxPossible) * 100), 100) : 0;
          return { label: d.label, key: d.key, pct: satPct, count: d.count, comments: d.comments };
        }); 
      }, [responses, deptId, departments]);

      const selectedMonthData = monthlyData.find(m => m.key === selectedMonth) || { comments: [], label: '', pct: 0, count: 0 };
      const latestMonth = monthlyData.find(m => m.key === currentMonthKey) || { pct: 0, count: 0, label: 'N/A' };
      
      const sortedComments = [...selectedMonthData.comments].sort((a,b) => new Date(b.date) - new Date(a.date));

      return (
        <div className="bg-white dark:bg-slate-800 rounded-[2rem] shadow-xl border border-slate-200 dark:border-slate-700 p-6 sm:p-12 print-dashboard relative transition-colors">
          <div className="absolute inset-0 z-0 opacity-10 pointer-events-none hidden print:block" style={{backgroundImage: `url('${BACKGROUND_URL}')`, backgroundSize: 'cover', backgroundPosition: 'center'}} />
          <div className="relative z-10">
            <div className="flex justify-between items-start mb-8 border-b border-slate-200 dark:border-slate-700 pb-6">
              <div><h2 className="text-3xl font-bold text-slate-900 dark:text-white font-serif">{dept?.title}</h2><p className="text-slate-500 dark:text-slate-400 mt-1 font-sans">Departmental Performance Report</p></div>
              <button onClick={() => window.print()} className="bg-slate-800 dark:bg-blue-600 text-white px-5 py-2.5 rounded-xl font-bold flex items-center gap-2 hover:bg-slate-700 dark:hover:bg-blue-700 no-print font-sans shadow-md"><Printer className="w-5 h-5" /> Print Report</button>
            </div>

            <div className="space-y-12">
              
              <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div className="bg-blue-50 dark:bg-blue-900/20 border border-blue-100 dark:border-blue-800/50 p-8 rounded-3xl shadow-sm flex flex-col justify-center">
                  <p className="text-blue-800 dark:text-blue-400 font-bold font-sans uppercase tracking-wide text-sm mb-2">Satisfaction Rate ({latestMonth.label})</p>
                  <div className="flex items-baseline gap-4 mt-2">
                     <p className="text-4xl sm:text-5xl lg:text-6xl font-black text-blue-900 dark:text-blue-100 font-sans truncate">{latestMonth.count > 0 ? latestMonth.pct + '%' : 'N/A'}</p>
                  </div>
                  <p className="text-xs font-bold text-blue-600 dark:text-blue-500 mt-4 tracking-wide leading-relaxed">
                     Calculation: (Total Points Earned ÷ Maximum Possible Points) × 100
                  </p>
                </div>
                <div className="bg-slate-50 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-700 p-8 rounded-3xl shadow-sm">
                   <p className="text-slate-600 dark:text-slate-400 font-bold font-sans uppercase tracking-wide text-sm mb-4">Legend / Scoring Guide</p>
                   <ul className="space-y-3 text-slate-700 dark:text-slate-300 font-medium">
                      <li className="flex items-center gap-3"><span className="text-2xl">😁</span> <span>Happy (3 Points)</span></li>
                      <li className="flex items-center gap-3"><span className="text-2xl">😐</span> <span>Neutral (2 Points)</span></li>
                      <li className="flex items-center gap-3"><span className="text-2xl">😢</span> <span>Sad (1 Point)</span></li>
                   </ul>
                </div>
              </div>

              <div>
                <h3 className="text-2xl font-black text-slate-800 dark:text-white mb-6 font-serif">Historical Trend (Satisfaction %)</h3>
                <div className="flex items-end gap-2 sm:gap-4 h-64 border-b-4 border-slate-100 dark:border-slate-700 pb-2 font-sans">
                  {monthlyData.map((m, i) => { 
                    const isCurrent = m.key === currentMonthKey;
                    const heightPct = m.count === 0 ? 0 : Math.max(m.pct, 5); 
                    return (
                      <div key={i} className="flex flex-col items-center flex-1 h-full justify-end relative">
                        <div className={`flex flex-col items-center mb-2`}>
                           <span className={`text-sm sm:text-lg font-black ${isCurrent ? 'text-indigo-700 dark:text-indigo-400' : 'text-slate-700 dark:text-slate-300'}`}>{m.count === 0 ? '-' : m.pct + '%'}</span>
                           {m.count > 0 && <span className="text-[10px] sm:text-xs text-slate-400 font-bold bg-slate-100 dark:bg-slate-800 px-2 py-0.5 rounded-full mt-1">Vol: {m.count}</span>}
                        </div>
                        <div className={`w-full max-w-[4rem] rounded-t-xl transition-all duration-1000 ${isCurrent ? 'bg-gradient-to-t from-indigo-500 to-indigo-400 shadow-lg' : m.pct < 66 && m.count > 0 ? 'bg-amber-400 dark:bg-amber-500' : 'bg-blue-400 dark:bg-blue-500'}`} style={{ height: `${heightPct}%`, minHeight: m.count > 0 ? '5%' : '4px' }}></div>
                        <div className={`text-xs font-bold mt-3 uppercase tracking-wider whitespace-nowrap ${isCurrent ? 'text-indigo-600 dark:text-indigo-400' : 'text-slate-500 dark:text-slate-400'}`}>{ALL_MONTHS_LABELS[i]}</div>
                      </div>
                    );
                  })}
                </div>
              </div>
              
                <div className="pt-8 border-t border-slate-200 dark:border-slate-700">
                  <h3 className="text-2xl font-black text-slate-800 dark:text-white font-serif mb-8">Patient Feedback Management</h3>
                  <CommentManager 
                    comments={sortedComments} 
                    commentCats={commentCats} 
                    setCommentCats={setCommentCats} 
                    selectedMonth={selectedMonth} 
                    onMonthChange={setSelectedMonth} 
                    monthsList={monthlyData.map(m=>m.key)}
                    showDeptFilter={false}
                  />
                </div>

            </div>
          </div>
        </div>
      );
    }

    function QRGenerator() {
      const currentUrl = window.location.href.split('?')[0]; 
      const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=500x500&data=${encodeURIComponent(currentUrl)}`;

      return (
        <div className="space-y-6 animate-in slide-in-from-bottom-2 w-full h-full flex flex-col items-center">
           <div className="w-full max-w-4xl flex justify-between items-center bg-white/90 dark:bg-slate-800/90 backdrop-blur-sm p-6 rounded-2xl border border-slate-200 dark:border-slate-700 shadow-md no-print font-sans transition-colors">
             <div><h3 className="font-bold text-xl text-slate-900 dark:text-white">QR Code Scanner</h3><p className="text-slate-500 dark:text-slate-400 text-sm mt-1">Have patients scan this screen directly, or print it to hang on a wall.</p></div>
             <button onClick={() => window.print()} className="bg-blue-600 text-white px-6 py-3 rounded-xl font-bold shadow-md hover:bg-blue-700 flex items-center gap-2"><Printer className="w-5 h-5" /> Print Poster</button>
           </div>
           
           <div className="print-qr-poster bg-slate-50 dark:bg-slate-900 w-full flex flex-col items-center justify-center relative sm:border border-slate-200 dark:border-slate-800 sm:rounded-3xl sm:min-h-[75vh] overflow-hidden font-sans transition-colors print:p-0 print:border-none print:bg-transparent">
             
              <div className="absolute inset-0 z-0 opacity-20 dark:opacity-10 pointer-events-none no-print" style={{backgroundImage: `url('${BACKGROUND_URL}')`, backgroundSize: 'cover', backgroundPosition: 'center'}} />

              <div className="print-qr-card-wrapper relative z-10 w-full">
                  <div className="flex flex-col items-center text-center max-w-[800px] w-full bg-white dark:bg-slate-800 rounded-[3rem] shadow-2xl p-10 sm:p-14 border-4 border-slate-200 dark:border-slate-700 mx-auto print:shadow-none print:border-8 mt-12 print:mt-0">
                    
                    <div className="bg-white px-8 py-5 rounded-[2rem] shadow-xl border-4 border-slate-50 dark:border-slate-700 -mt-24 sm:-mt-28 print:-mt-28 mb-8 inline-block">
                      <img src={LOGO_URL} alt="Taytay Doctors Logo" className="h-24 sm:h-28 w-auto object-contain drop-shadow-sm" />
                    </div>
                    
                    <h2 className="text-blue-600 dark:text-blue-400 font-bold tracking-widest uppercase mb-2 text-lg">We Value Your Feedback</h2>
                    <h1 className="text-5xl sm:text-6xl font-black text-slate-900 dark:text-white mb-6 tracking-tight leading-tight uppercase font-serif drop-shadow-sm">Patient Survey</h1>
                    
                    <p className="text-lg sm:text-xl text-slate-600 dark:text-slate-300 mb-10 font-medium leading-relaxed px-4">Please let us know how we did today. Your input helps us continuously improve our quality of care.</p>
                    
                    <div className="bg-white p-5 rounded-[2rem] shadow-2xl border-4 border-blue-500 inline-block mb-10">
                       <img src={qrUrl} alt="QR Code" className="w-56 h-56 sm:w-72 sm:h-72 object-contain" />
                    </div>
                    
                    <div className="grid grid-cols-3 gap-2 sm:gap-6 text-left w-full mb-6 max-w-lg mx-auto">
                        <div className="flex flex-col items-center text-center space-y-3">
                            <div className="w-12 h-12 rounded-full bg-blue-100 dark:bg-slate-700 text-blue-700 dark:text-blue-400 flex items-center justify-center font-black text-xl shadow-inner border border-blue-200 dark:border-slate-600">1</div>
                            <p className="text-sm font-bold text-slate-700 dark:text-slate-200 uppercase tracking-wide">Open<br/>Camera</p>
                        </div>
                        <div className="flex flex-col items-center text-center space-y-3">
                            <div className="w-12 h-12 rounded-full bg-blue-100 dark:bg-slate-700 text-blue-700 dark:text-blue-400 flex items-center justify-center font-black text-xl shadow-inner border border-blue-200 dark:border-slate-600">2</div>
                            <p className="text-sm font-bold text-slate-700 dark:text-slate-200 uppercase tracking-wide">Scan<br/>QR Code</p>
                        </div>
                        <div className="flex flex-col items-center text-center space-y-3">
                            <div className="w-12 h-12 rounded-full bg-blue-100 dark:bg-slate-700 text-blue-700 dark:text-blue-400 flex items-center justify-center font-black text-xl shadow-inner border border-blue-200 dark:border-slate-600">3</div>
                            <p className="text-sm font-bold text-slate-700 dark:text-slate-200 uppercase tracking-wide">Tap<br/>To Start</p>
                        </div>
                    </div>

                    <div className="text-slate-400 font-bold text-sm sm:text-base flex items-center justify-center gap-4 w-full uppercase tracking-widest mt-4">
                      <span className="flex-1 h-px bg-slate-200 dark:bg-slate-700"></span> 
                      Thank You 
                      <span className="flex-1 h-px bg-slate-200 dark:bg-slate-700"></span>
                    </div>

                  </div>
              </div>
              <div className="absolute bottom-6 left-1/2 transform -translate-x-1/2 text-sm font-bold text-slate-500 dark:text-slate-500 tracking-widest px-4 py-2 bg-transparent">{FORM_CONTROL_NO}</div>
           </div>
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
