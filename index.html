<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TDMH Patient Satisfaction Survey</title>
  
  <!-- Tailwind CSS for Styling -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Babel to compile React JSX in the browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Import Maps to load React and Lucide Icons directly in the browser -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.344.0"
      }
    }
  </script>
</head>
<body>
  <!-- This is where your React app will mount -->
  <div id="root"></div>

  <!-- Your exact React code, marked as a module so imports work -->
  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useMemo } from 'react';
    import { createRoot } from 'react-dom/client';
    import { 
      ClipboardList, LayoutDashboard, ChevronRight, SkipForward, 
      ThumbsUp, MessageSquare, Star, ArrowLeft, Settings, 
      UserCheck, AlertTriangle, Send, Lock, BarChart, QrCode, Printer, 
      BarChart3, Plus, Edit2, TrendingUp, TrendingDown, HeartHandshake, X, CalendarDays, RefreshCw
    } from 'lucide-react';

    // --- CONFIGURATION & EXTERNAL ASSETS ---
    const FORM_CONTROL_NO = "TDMH-CQI-F-001-4-0";
    const GITHUB_BASE_URL = "https://raw.githubusercontent.com/tdmh-cqi/CustomerSurvey/main/images";
    const LOGO_URL = `${GITHUB_BASE_URL}/tdmh-logo.png`;
    const BACKGROUND_URL = `${GITHUB_BASE_URL}/tdmh-background.jpg`;

    // APPS SCRIPT WEB APP URL
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw93n00Ey6NoG92Nvcli_uAzeDINXBOL_i6El6txQvoYEp4pLFlQ5BSyxKUqUiI2DUCiQ/exec"; 

    // --- DEFAULT DATA DEFINITIONS ---
    const DEFAULT_DEPARTMENTS = [
      { id: 'admitting', title: '1. Admitting Services', questions: [{ id: 'adm_1', text: 'Ease of the admission process (registration, waiting time, paperwork)' }, { id: 'adm_2', text: 'Did the staff clearly explain the forms you were signing?' }, { id: 'adm_3', text: 'Were your financial responsibilities/insurance explained clearly?' }, { id: 'adm_4', text: 'Comfort and cleanliness of the waiting area' }, { id: 'adm_5', text: 'Courtesy and professionalism of the staff' }] },
      { id: 'er', title: '2. Emergency Services (E.R)', questions: [{ id: 'er_1', text: 'The triage process was handled efficiently.' }, { id: 'er_2', text: 'Provide adequate information regarding your health conditions and management.' }, { id: 'er_3', text: 'The waiting time was reasonable.' }, { id: 'er_4', text: 'Comfort and cleanliness of the waiting area' }, { id: 'er_5', text: 'Staff treat you with courtesy and respect' }] },
      { id: 'nursing', title: '3. Patient Care/Nursing Services', questions: [{ id: 'nur_1', text: 'How often did healthcare team treat you with courtesy and respect?' }, { id: 'nur_2', text: 'How clearly did the Nurses/Doctors explain your treatments?' }, { id: 'nur_3', text: 'Promptness in attending to patient\'s needs and comfort.' }, { id: 'nur_4', text: 'Were you involved as much as you wanted to be in decisions about your care and treatment?' }, { id: 'nur_5', text: 'Receive clear, written information regarding follow-up care?' }] },
      { id: 'ancillary', title: '4. Ancillary/Diagnostic Services', questions: [{ id: 'anc_1', text: 'Radiology Services' }, { id: 'anc_2', text: 'Pathology & Laboratory Services' }, { id: 'anc_3', text: 'Heart Station' }, { id: 'anc_4', text: 'Pharmacy' }] },
      { id: 'dietary', title: '5. Dietary Services', questions: [{ id: 'die_1', text: 'Courtesy and politeness of staff' }, { id: 'die_2', text: 'Tastiness of food' }, { id: 'die_3', text: 'Food presentation' }, { id: 'die_4', text: 'Food Variation' }, { id: 'die_5', text: 'Cleanliness of utensils' }] },
      { id: 'special', title: '6. Special Services', questions: [{ id: 'spc_1', text: 'Operating Room' }, { id: 'spc_2', text: 'Neonatal ICU' }, { id: 'spc_3', text: 'Hemodialysis' }] },
      { id: 'cashier', title: '7. Cashier', questions: [{ id: 'cas_1', text: 'Courtesy and politeness' }, { id: 'cas_2', text: 'Promptness in attending to your needs' }, { id: 'cas_3', text: 'Accuracy in processing transactions' }] },
      { id: 'billing', title: '8. Billing', questions: [{ id: 'bil_1', text: 'Courtesy and politeness' }, { id: 'bil_2', text: 'Promptness in preparing the statement of the Account' }, { id: 'bil_3', text: 'Accuracy in processing the official statement of account' }] },
      { id: 'philhealth', title: '9. Philhealth', questions: [{ id: 'phi_1', text: 'Courtesy and politeness' }, { id: 'phi_2', text: 'Promptness in attending to your needs' }, { id: 'phi_3', text: 'Ability to explain requirements' }] },
      { id: 'housekeeping', title: '10. General Services: Housekeeping & Linens', questions: [{ id: 'hsk_1', text: 'Courtesy and politeness of staff' }, { id: 'hsk_2', text: 'Cleanliness of room and toilet' }, { id: 'hsk_3', text: 'Cleanliness of linens' }, { id: 'hsk_4', text: 'Promptness in attending to your Requests' }] },
      { id: 'facilities', title: '11. General Services: Room Facilities & Utilities', questions: [{ id: 'fac_1', text: 'Ventilation/Air conditioning' }, { id: 'fac_2', text: 'Call Buttons' }, { id: 'fac_3', text: 'Lighting' }, { id: 'fac_4', text: 'Furniture/fixtures and appliances' }] },
      { id: 'parking', title: '12. General Services: Parking', questions: [{ id: 'par_1', text: 'Availability of space' }, { id: 'par_2', text: 'Safety of the area' }, { id: 'par_3', text: 'Sufficient Lighting' }] },
      { id: 'security', title: '13. General Services: Elevator & Security', questions: [{ id: 'sec_1', text: 'Availability of the elevator' }, { id: 'sec_2', text: 'Cleanliness of the elevator' }, { id: 'sec_3', text: 'Security: Courtesy and politeness' }, { id: 'sec_4', text: 'Security: Ability to protect clients (bag inspection)' }, { id: 'sec_5', text: 'Security: Promptness in attending to security calls' }] }
    ];

    // Split the questions into Intake (Start) and General (End)
    const INTAKE_QUESTIONS = [
      { id: 'date', text: 'Date of Visit / Admission', type: 'date', required: true },
      { id: 'room_number', text: 'Room Number / Ward', type: 'short_text', required: true },
      { id: 'patient_name', text: 'Patient Name (Optional)', type: 'short_text', required: false }
    ];

    const GENERAL_QUESTIONS = [
      { id: 'gen_1', text: 'Is this your first time being admitted to this facility?', type: 'yesno', required: true },
      { id: 'gen_2', text: 'Have you visited or have you been admitted to another hospital?', type: 'yesno', required: true },
      { id: 'gen_3', text: 'How do you compare Taytay Doctors Multispecialty Hospital to other hospitals?', type: 'text', required: true },
      { id: 'gen_4', text: 'Do you want to receive health tips and service updates from Taytay Doctors?', type: 'yesno', required: true },
      { id: 'gen_5', text: 'Would you recommend our hospital to your family and friends?', type: 'yesno', required: true },
      { id: 'gen_6', text: 'Generally, were you satisfied with our services?', type: 'yesno', required: true }
    ];

    // --- UTILITY LOGIC ---
    const getMonthString = (dateObj) => `${dateObj.getFullYear()}-${String(dateObj.getMonth() + 1).padStart(2, '0')}`;
    const getPrevMonthString = () => {
        const d = new Date(); d.setMonth(d.getMonth() - 1); return getMonthString(d);
    };

    // --- MAIN APPLICATION COMPONENT ---
    function App() {
      const [view, setView] = useState('home'); 
      const [activeDeptId, setActiveDeptId] = useState(null); 
      const [isSubmitting, setIsSubmitting] = useState(false);
      const [isSyncing, setIsSyncing] = useState(false);
      const [drillDown, setDrillDown] = useState(null); 

      const [responses, setResponses] = useState(() => {
        const saved = localStorage.getItem('tdmh_responses');
        return saved ? JSON.parse(saved) : [];
      });

      const [departments, setDepartments] = useState(() => {
        const saved = localStorage.getItem('tdmh_departments'); return saved ? JSON.parse(saved) : DEFAULT_DEPARTMENTS;
      });
      const [activeDepartments, setActiveDepartments] = useState(() => {
        const saved = localStorage.getItem('tdmh_active_depts'); return saved ? JSON.parse(saved) : departments.reduce((acc, dept) => ({ ...acc, [dept.id]: true }), {});
      });

      useEffect(() => localStorage.setItem('tdmh_departments', JSON.stringify(departments)), [departments]);
      useEffect(() => localStorage.setItem('tdmh_active_depts', JSON.stringify(activeDepartments)), [activeDepartments]);

      // REAL-TIME BACKGROUND SYNC (Polling)
      useEffect(() => {
        if (!APPS_SCRIPT_URL) return;
        
        const fetchHistory = async () => {
          if (view === 'admin' || view === 'dept') setIsSyncing(true);
          
          try {
            const lastSync = localStorage.getItem('tdmh_last_sync') || '';
            const fetchUrl = lastSync ? `${APPS_SCRIPT_URL}?lastSync=${encodeURIComponent(lastSync)}` : APPS_SCRIPT_URL;
            
            const res = await fetch(fetchUrl);
            const newData = await res.json();
            
            if (Array.isArray(newData) && newData.length > 0) {
              setResponses(prev => {
                const combined = [...newData, ...prev];
                const uniqueMap = new Map();
                combined.forEach(item => { if (item.id) uniqueMap.set(item.id, item); });
                const sortedUnique = Array.from(uniqueMap.values()).sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
                
                localStorage.setItem('tdmh_responses', JSON.stringify(sortedUnique));
                return sortedUnique;
              });
            }
            
            localStorage.setItem('tdmh_last_sync', new Date().toISOString());

          } catch (err) {
            console.error("Historical data sync failed.", err);
          } finally {
            setIsSyncing(false);
          }
        };

        fetchHistory();
        const intervalId = setInterval(() => { if (view === 'admin' || view === 'dept') fetchHistory(); }, 30000); 
        return () => clearInterval(intervalId); 
      }, [view]);

      const handleSurveySubmit = async (surveyData) => {
        setIsSubmitting(true);
        const finalData = { ...surveyData, timestamp: new Date().toISOString(), id: Date.now().toString() };
        
        Object.keys(finalData.departments).forEach(id => {
          finalData.departments[id].title = departments.find(d => d.id === id)?.title;
        });
        
        setResponses(prev => {
          const newResponses = [finalData, ...prev];
          localStorage.setItem('tdmh_responses', JSON.stringify(newResponses));
          return newResponses;
        });

        if (APPS_SCRIPT_URL) {
          try {
            await fetch(APPS_SCRIPT_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(finalData) });
          } catch (error) { console.error("Error saving to Google Sheets:", error); }
        }
        
        setIsSubmitting(false); setView('home');
        alert("Survey submitted successfully! Thank you for your feedback.");
      };

      return (
        <div className={`min-h-screen bg-slate-50 text-slate-800 selection:bg-teal-200 relative pro-font flex flex-col ${drillDown ? 'overflow-hidden' : ''}`}>
          <style dangerouslySetInnerHTML={{__html: `
            @import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap');
            .pro-font { font-family: 'Lora', serif; }
            .hide-scrollbar::-webkit-scrollbar { display: none; }
            .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
            
            .custom-scrollbar::-webkit-scrollbar { height: 6px; }
            .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
            .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
            .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
            
            @media print {
              body * { visibility: hidden; }
              body.printing-modal .print-modal-content, body.printing-modal .print-modal-content * { visibility: visible; }
              body.printing-modal .print-modal-content { position: absolute; left: 0; top: 0; width: 100%; height: auto; box-shadow: none; border: none; }
              body:not(.printing-modal) .print-dashboard, body:not(.printing-modal) .print-dashboard * { visibility: visible; }
              body:not(.printing-modal) .print-dashboard { position: absolute; left: 0; top: 0; width: 100%; margin: 0; padding: 0; }
              .no-print { display: none !important; }
            }
          `}} />

          {drillDown && <style>{`body { class: "printing-modal" }`}</style>}
          {!drillDown && <style>{`body { class: "" }`}</style>}

          <div className="fixed inset-0 z-0 pointer-events-none opacity-25 mix-blend-multiply no-print" style={{ backgroundImage: `url('${BACKGROUND_URL}')`, backgroundSize: 'cover', backgroundPosition: 'center', backgroundAttachment: 'fixed' }} />
          
          <header className="bg-white/95 backdrop-blur-md shadow-sm border-b-4 border-emerald-600 sticky top-0 z-20 no-print">
            <div className="max-w-6xl mx-auto px-4 py-3 sm:py-4 flex items-center justify-between relative min-h-[6rem] sm:min-h-[7rem]">
              <div className="flex-1 flex justify-start items-center">
                {view === 'home' && (
                  <button onClick={() => setView('qr')} className="text-sm font-bold text-slate-500 hover:text-emerald-700 flex items-center gap-2 px-3 py-2 rounded-xl transition-all hover:bg-emerald-50 border border-transparent hover:border-emerald-200 shadow-sm bg-white">
                    <QrCode className="w-5 h-5" /> <span className="hidden sm:inline">Show QR Sign</span>
                  </button>
                )}
                {(view === 'admin' || view === 'dept') && isSyncing && (
                  <span className="text-xs font-bold text-slate-400 flex items-center gap-2 animate-pulse bg-slate-100 px-3 py-1.5 rounded-lg border border-slate-200"><RefreshCw className="w-3 h-3 animate-spin"/> Syncing DB</span>
                )}
              </div>
              <div className="flex-1 flex justify-center cursor-pointer group" title="Refresh Site" onClick={() => window.location.reload()}>
                <img src={LOGO_URL} alt="Taytay Doctors Logo" className="h-16 sm:h-20 md:h-24 lg:h-28 w-auto object-contain transition-transform duration-300 group-hover:scale-110 drop-shadow-md" />
              </div>
              <div className="flex-1 flex justify-end items-center gap-4">
                {view === 'home' && (
                  <button onClick={() => setView('login')} className="text-sm font-bold text-slate-500 hover:text-emerald-700 flex items-center gap-2 px-3 py-2 rounded-xl transition-all hover:bg-emerald-50 shadow-sm bg-white border border-transparent hover:border-emerald-200">
                    <Lock className="w-4 h-4" /> <span className="hidden sm:inline">Staff Portal</span>
                  </button>
                )}
                {view !== 'home' && (
                  <button onClick={() => setView('home')} className="text-sm font-bold text-emerald-800 hover:text-white hover:bg-emerald-600 flex items-center gap-2 bg-emerald-100 px-5 py-2.5 rounded-xl transition-all shadow-sm">
                    <ArrowLeft className="w-5 h-5" /> HOME
                  </button>
                )}
              </div>
            </div>
          </header>

          <main className="max-w-5xl mx-auto w-full p-4 sm:p-6 lg:p-8 relative z-10 flex-grow">
            {view === 'home' && <HomeView setView={setView} />}
            {view === 'survey' && <PatientSurvey onSubmit={handleSurveySubmit} activeDepartments={activeDepartments} departments={departments} isSubmitting={isSubmitting} />}
            {view === 'login' && <LoginSelectView setView={setView} setActiveDeptId={setActiveDeptId} departments={departments} />}
            {view === 'admin' && <AdminDashboard responses={responses} activeDepartments={activeDepartments} setActiveDepartments={setActiveDepartments} departments={departments} setDepartments={setDepartments} drillDown={drillDown} setDrillDown={setDrillDown} />}
            {view === 'dept' && <DepartmentDashboard responses={responses} deptId={activeDeptId} departments={departments} />}
            {view === 'qr' && <QRGenerator />}
          </main>

          <div className="fixed bottom-3 right-4 z-20 text-xs sm:text-sm font-bold text-slate-500/80 pointer-events-none tracking-widest no-print">
            {FORM_CONTROL_NO}
          </div>

          {drillDown && <DrillDownModal drillDown={drillDown} setDrillDown={setDrillDown} />}
        </div>
      );
    }

    // --- HOME VIEW ---
    function HomeView({ setView }) {
      return (
        <div className="flex flex-col items-center justify-center min-h-[70vh] animate-in fade-in zoom-in duration-500">
          <div className="bg-white/95 backdrop-blur-sm p-8 sm:p-14 rounded-[2rem] shadow-2xl border border-white max-w-xl w-full text-center relative overflow-hidden">
            <div className="relative z-10">
              <div className="w-24 h-24 bg-gradient-to-br from-emerald-600 to-teal-800 text-white rounded-3xl flex items-center justify-center mx-auto mb-8 shadow-xl shadow-emerald-500/20 rotate-3 transform hover:rotate-0 transition-transform"><ClipboardList className="w-12 h-12 -rotate-3" /></div>
              <h2 className="text-3xl sm:text-4xl font-black text-slate-900 mb-4 tracking-tight leading-snug">Patient Satisfaction Survey</h2>
              <p className="text-slate-600 mb-10 font-medium text-lg leading-relaxed">We value your health and your opinion. Please take a moment to rate your experience so we can serve you better.</p>
              <button onClick={() => setView('survey')} className="w-full bg-gradient-to-r from-emerald-600 to-teal-700 hover:from-emerald-700 hover:to-teal-800 text-white font-bold py-5 px-6 rounded-2xl shadow-xl shadow-emerald-500/30 transition-all active:scale-95 flex items-center justify-center gap-3 text-xl tracking-wide group border border-emerald-500">
                Start Survey <ChevronRight className="w-7 h-7 group-hover:translate-x-1 transition-transform" />
              </button>
            </div>
          </div>
        </div>
      );
    }

    // --- PATIENT SURVEY WIZARD ---
    function PatientSurvey({ onSubmit, activeDepartments, departments, isSubmitting }) {
      const availableDepartments = departments.filter(dept => activeDepartments[dept.id]);
      
      // step 0 = intake, step 1 to N = departments, step N+1 = general feedback
      const [step, setStep] = useState(0);
      const [surveyData, setSurveyData] = useState({ departments: {}, general: {} });
      
      const isIntakeStep = step === 0;
      const isGeneralStep = step === availableDepartments.length + 1;
      const currentDept = (!isIntakeStep && !isGeneralStep) ? availableDepartments[step - 1] : null;

      const [currentAnswers, setCurrentAnswers] = useState({});
      const [currentComment, setCurrentComment] = useState("");

      useEffect(() => {
        if (currentDept && surveyData.departments[currentDept.id]) {
          setCurrentAnswers(surveyData.departments[currentDept.id].answers || {});
          setCurrentComment(surveyData.departments[currentDept.id].comment || "");
        } else { setCurrentAnswers({}); setCurrentComment(""); }
      }, [step, currentDept, surveyData]);

      const handleRating = (questionId, score) => setCurrentAnswers(prev => ({ ...prev, [questionId]: score }));

      const handleIntakeSubmit = (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        const intake = {};
        INTAKE_QUESTIONS.forEach(q => intake[q.id] = formData.get(q.id) || "");
        setSurveyData(prev => ({ ...prev, general: { ...prev.general, ...intake } }));
        setStep(1); // Proceed to first department
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      const saveDepartmentAndProceed = (skipped = false) => {
        if (currentDept) {
          setSurveyData(prev => ({ 
            ...prev, 
            departments: { 
              ...prev.departments, 
              [currentDept.id]: { skipped, answers: skipped ? {} : currentAnswers, comment: skipped ? "" : currentComment } 
            } 
          }));
        }
        setStep(prev => prev + 1);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      };

      const handleGeneralSubmit = (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        const generalData = { ...surveyData.general }; // Start with intake answers
        GENERAL_QUESTIONS.forEach(q => generalData[q.id] = formData.get(q.id) || "");
        onSubmit({ ...surveyData, general: generalData });
      };

      const answeredScores = Object.values(currentAnswers);
      const lowestScore = answeredScores.length > 0 ? Math.min(...answeredScores) : null;
      const needsImprovement = lowestScore !== null && lowestScore <= 2;
      const progressPercent = (step / (availableDepartments.length + 1)) * 100;

      if (isIntakeStep) {
        return (
          <div className="max-w-3xl mx-auto animate-in slide-in-from-right-8 duration-500 font-sans">
            <div className="mb-6"><div className="h-3 w-full bg-slate-100 rounded-full overflow-hidden shadow-inner"></div><p className="text-right text-sm text-slate-500 mt-2 font-bold uppercase tracking-wider bg-white/50 inline-block px-2 rounded float-right">Initial Details</p><div className="clear-both"></div></div>
            <div className="bg-white/95 backdrop-blur-md rounded-[2rem] shadow-2xl overflow-hidden border border-white">
              <div className="bg-gradient-to-br from-emerald-600 to-teal-800 p-8 text-white text-center"><h2 className="text-3xl font-bold font-serif">Visit Details</h2><p className="text-teal-100 mt-2 text-lg">Please provide a few details about your visit before we begin.</p></div>
              <form onSubmit={handleIntakeSubmit} className="p-6 sm:p-10 space-y-8">
                {INTAKE_QUESTIONS.map((q) => (
                  <div key={q.id} className="space-y-4 bg-slate-50 p-6 rounded-2xl border border-slate-100">
                    <label className="block text-slate-800 font-bold text-lg leading-snug">
                      {q.text} {q.required && <span className="text-red-500">*</span>}
                    </label>
                    {q.type === 'short_text' ? (
                      <input type="text" name={q.id} required={q.required} defaultValue={surveyData.general[q.id] || ''} className="w-full border-2 border-slate-200 rounded-xl p-4 focus:ring-2 focus:ring-emerald-200 focus:border-emerald-500 outline-none font-medium text-slate-700" placeholder="Type your answer here..." />
                    ) : q.type === 'date' ? (
                      <input type="date" name={q.id} required={q.required} defaultValue={surveyData.general[q.id] || ''} className="w-full border-2 border-slate-200 rounded-xl p-4 focus:ring-2 focus:ring-emerald-200 focus:border-emerald-500 outline-none font-medium text-slate-700" />
                    ) : null}
                  </div>
                ))}
                <div className="pt-6 flex gap-4">
                  <button type="submit" className="flex-1 bg-gradient-to-r from-emerald-600 to-teal-700 hover:from-emerald-700 hover:to-teal-800 text-white font-bold py-4 px-6 rounded-xl shadow-lg transition-all active:scale-95 flex items-center justify-center gap-2 text-xl">Continue to Survey <ChevronRight className="w-6 h-6" /></button>
                </div>
              </form>
            </div>
          </div>
        );
      }

      if (isGeneralStep) {
        return (
          <div className="max-w-3xl mx-auto animate-in slide-in-from-right-8 duration-500 font-sans">
            <div className="mb-6"><div className="h-3 w-full bg-emerald-100 rounded-full overflow-hidden shadow-inner"><div className="h-full bg-gradient-to-r from-emerald-500 to-teal-500 transition-all duration-500" style={{ width: '100%' }}></div></div><p className="text-right text-sm text-emerald-800 mt-2 font-bold uppercase tracking-wider bg-white/50 inline-block px-2 rounded float-right">Final Step</p><div className="clear-both"></div></div>
            <div className="bg-white/95 backdrop-blur-md rounded-[2rem] shadow-2xl overflow-hidden border border-white">
              <div className="bg-gradient-to-br from-teal-700 to-emerald-900 p-8 text-white text-center"><h2 className="text-3xl font-bold font-serif">Overall Experience</h2><p className="text-teal-100 mt-2 text-lg">Almost done! Help us understand the bigger picture.</p></div>
              <form onSubmit={handleGeneralSubmit} className="p-6 sm:p-10 space-y-8">
                {GENERAL_QUESTIONS.map((q) => (
                  <div key={q.id} className="space-y-4 bg-slate-50 p-6 rounded-2xl border border-slate-100">
                    <label className="block text-slate-800 font-bold text-lg leading-snug">
                      {q.text} {q.required && <span className="text-red-500">*</span>}
                    </label>
                    {q.type === 'yesno' ? (
                      <div className="flex gap-4">

    // --- PORTAL LOGIN VIEW ---
    function LoginSelectView({ setView, setActiveDeptId, departments }) {
      const [selectedDept, setSelectedDept] = useState(departments[0].id);
      const [loginType, setLoginType] = useState(null); 
      const [password, setPassword] = useState('');
      const [error, setError] = useState('');
      const [isAuthenticating, setIsAuthenticating] = useState(false);

      const handleLogin = async (e) => {
        e.preventDefault();
        setIsAuthenticating(true);
        setError('');
        
        const id = loginType === 'admin' ? 'admin' : selectedDept;
        const name = loginType === 'admin' ? 'Master Admin' : departments.find(d => d.id === selectedDept)?.title;
        
        try {
          const url = `${APPS_SCRIPT_URL}?action=login&id=${encodeURIComponent(id)}&name=${encodeURIComponent(name)}&password=${encodeURIComponent(password)}`;
          const res = await fetch(url);
          const data = await res.json();
          
          if (data.success) {
              setError('');
              if (loginType === 'admin') setView('admin'); else { setActiveDeptId(selectedDept); setView('dept'); }
          } else {
              setError(data.message || 'Incorrect Password');
          }
        } catch (err) {
          console.error("Login fetch error:", err);
          setError('Network error connecting to database.');
        }
        
        setIsAuthenticating(false);
      };

      if (loginType) {
         return (
           <div className="flex flex-col items-center justify-center min-h-[60vh] animate-in fade-in duration-300">
             <div className="bg-white p-8 rounded-[2rem] shadow-xl max-w-md w-full border border-slate-100 relative">
                <button onClick={() => {setLoginType(null); setPassword(''); setError('');}} className="absolute top-6 left-6 text-slate-400 hover:text-slate-600 transition-colors"><ArrowLeft className="w-6 h-6"/></button>
                <div className="flex justify-center mb-4">{loginType === 'admin' ? <LayoutDashboard className="w-10 h-10 text-slate-700" /> : <BarChart className="w-10 h-10 text-emerald-600" />}</div>
                <h2 className="text-2xl font-bold text-slate-800 mb-2 text-center">{loginType === 'admin' ? 'Master Admin' : departments.find(d=>d.id===selectedDept)?.title.replace(/^\d+\.\s*/, '')}</h2>
                <p className="text-center text-slate-500 mb-8">Enter secure password to continue.</p>
                <form onSubmit={handleLogin} className="space-y-4">
                  <input type="password" value={password} onChange={e => setPassword(e.target.value)} disabled={isAuthenticating} className="w-full p-4 border-2 border-slate-200 rounded-xl outline-none focus:border-emerald-500 font-sans text-lg disabled:opacity-50" placeholder="Enter Password" autoFocus />
                  {error && <p className="text-red-500 text-sm mt-2 font-bold flex items-center gap-1"><AlertTriangle className="w-4 h-4"/>{error}</p>}
                  <button type="submit" disabled={isAuthenticating} className="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-4 rounded-xl text-lg transition-colors active:scale-95 flex justify-center items-center gap-2 disabled:opacity-70">
                    {isAuthenticating ? <><RefreshCw className="w-5 h-5 animate-spin" /> Verifying...</> : 'Unlock Portal'}
                  </button>
                </form>
             </div>
           </div>
         )
      }

      return (
        <div className="flex flex-col items-center justify-center min-h-[60vh] animate-in fade-in duration-300">
          <div className="bg-white p-8 sm:p-12 rounded-[2rem] shadow-xl max-w-2xl w-full border border-slate-100">
            <h2 className="text-2xl font-bold text-slate-800 mb-8 text-center flex items-center justify-center gap-3"><Lock className="w-6 h-6 text-emerald-600" /> Staff Access Portal</h2>
            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
              <div className="bg-slate-50 p-8 rounded-2xl border border-slate-200 flex flex-col items-center text-center hover:shadow-md transition-shadow cursor-pointer group" onClick={() => setLoginType('admin')}>
                <LayoutDashboard className="w-12 h-12 text-slate-700 mb-4 group-hover:scale-110 transition-transform" />
                <h3 className="font-bold text-lg text-slate-800 mb-2">Main Administration</h3>
                <p className="text-sm text-slate-500 mb-6">Access facility-wide scores, analytics, and edit departments.</p>
                <button className="mt-auto w-full bg-slate-800 text-white font-bold py-3 px-4 rounded-xl">Enter Master Portal</button>
              </div>
              <div className="bg-emerald-50 p-8 rounded-2xl border border-emerald-200 flex flex-col items-center text-center hover:shadow-md transition-shadow">
                <BarChart className="w-12 h-12 text-emerald-600 mb-4" />
                <h3 className="font-bold text-lg text-emerald-900 mb-2">Department Heads</h3>
                <p className="text-sm text-emerald-700/80 mb-6">View isolated reports and charts for your unit.</p>
                <select className="w-full mb-4 p-3 rounded-xl border border-emerald-300 bg-white font-medium outline-none focus:ring-2 focus:ring-emerald-500" value={selectedDept} onChange={(e) => setSelectedDept(e.target.value)}>
                  {departments.map(d => <option key={d.id} value={d.id}>{d.title.replace(/^\d+\.\s*/, '')}</option>)}
                </select>
                <button onClick={() => setLoginType('dept')} className="mt-auto w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 px-4 rounded-xl transition-colors">View Dept Report</button>

    // --- MASTER ADMIN DASHBOARD ---
    function AdminDashboard({ responses, activeDepartments, setActiveDepartments, departments, setDepartments, drillDown, setDrillDown }) {
      const [activeTab, setActiveTab] = useState('overview'); 
      const [newDeptName, setNewDeptName] = useState('');
      const [newQuestions, setNewQuestions] = useState({});

      const analytics = useMemo(() => {
        const curMonthStr = getMonthString(new Date());
        const prevMonthStr = getPrevMonthString();

        let totalScore = 0; let totalQuestionsAnswered = 0;
        
        const deptStats = {};
        departments.forEach(d => deptStats[d.id] = { curScore: 0, curCount: 0, prevScore: 0, prevCount: 0, comments: [], criticalAlerts: [] });
        
        let allCommentsText = "";
        const monthlyResponsesTally = {};

        const genTallies = {};
        GENERAL_QUESTIONS.forEach(q => {
          genTallies[q.id] = { id: q.id, text: q.text, type: q.type, overall: { Yes: 0, No: 0 }, monthly: {}, mostCritical: null };
        });
        const criticalRegex = /\b(bad|slow|poor|worse|rude|dirty|terrible|awful|unhelpful|unorganized|long wait|worst)\b/gi;

        responses.forEach(res => {
          if (!res || !res.timestamp) return;
          const isCurMonth = res.timestamp.startsWith(curMonthStr);
          const isPrevMonth = res.timestamp.startsWith(prevMonthStr);
          const resMonth = getMonthString(new Date(res.timestamp));

          monthlyResponsesTally[resMonth] = (monthlyResponsesTally[resMonth] || 0) + 1;

          if (res.general) {
            GENERAL_QUESTIONS.forEach(q => {
              const ans = res.general[q.id];
              if (!ans) return;
              if (!genTallies[q.id].monthly[resMonth]) genTallies[q.id].monthly[resMonth] = { Yes: 0, No: 0, responses: [], isText: q.type === 'text' || q.type === 'short_text' || q.type === 'date' };

              if (q.type === 'yesno') {
                genTallies[q.id].overall[ans]++;
                genTallies[q.id].monthly[resMonth][ans]++;
                genTallies[q.id].monthly[resMonth].responses.push({ date: res.timestamp, value: ans, isText: false });
              } else {
                 genTallies[q.id].monthly[resMonth].responses.push({ date: res.timestamp, value: ans, isText: true });
                 const matchCount = (ans.match(criticalRegex) || []).length;
                 if (matchCount > 0) {
                   if (!genTallies[q.id].mostCritical || matchCount > genTallies[q.id].mostCritical.score) {
                     genTallies[q.id].mostCritical = { text: ans, score: matchCount, date: res.timestamp };
                   }
                 }
              }
            });
          }

          if (!res.departments) return;
          Object.entries(res.departments).forEach(([deptId, data]) => {
            if (!data.skipped && deptStats[deptId] && data.answers) {
              let resScore = 0; let resCount = 0;
              Object.values(data.answers).forEach(score => {
                 resScore += score; resCount += 1;
                 totalScore += score; totalQuestionsAnswered += 1;
                 if (isCurMonth) { deptStats[deptId].curScore += score; deptStats[deptId].curCount += 1; }
                 if (isPrevMonth) { deptStats[deptId].prevScore += score; deptStats[deptId].prevCount += 1; }
              });

              const avgResScore = resCount > 0 ? (resScore/resCount) : 0;
              if (data.comment && data.comment.trim() !== '') {
                allCommentsText += " " + data.comment;
                deptStats[deptId].comments.push({ text: data.comment, date: res.timestamp, type: avgResScore <= 2.5 ? 'improvement' : 'compliment' });
                if (Object.values(data.answers).includes(1)) deptStats[deptId].criticalAlerts.push({ text: data.comment, date: res.timestamp });
              }
            }
          });
        });

        const deptAverages = Object.keys(deptStats).map(id => {
          const d = deptStats[id];
          const curAvg = d.curCount > 0 ? (d.curScore / d.curCount) : 0;
          const prevAvg = d.prevCount > 0 ? (d.prevScore / d.prevCount) : 0;
          const trend = curAvg > 0 && prevAvg > 0 ? (curAvg - prevAvg).toFixed(2) : null;
          return { 
            id, title: departments.find(dept=>dept.id === id)?.title || "Unknown", 
            avg: d.curCount > 0 ? curAvg.toFixed(2) : null, 
            prevAvg: prevAvg > 0 ? prevAvg.toFixed(2) : 'N/A',
            trend, comments: d.comments, alerts: d.criticalAlerts 
          };
        }).sort((a,b) => (b.avg || 0) - (a.avg || 0));

        const allTimeDeptAverages = Object.keys(deptStats).map(id => {
          let allTimeScore = 0; let allTimeCount = 0;
          responses.forEach(res => {
            if(res.departments?.[id] && !res.departments[id].skipped && res.departments[id].answers) {
              Object.values(res.departments[id].answers).forEach(s => { allTimeScore += s; allTimeCount++; });
            }
          });
          return { id, title: departments.find(dept=>dept.id === id)?.title || "Unknown", avg: allTimeCount > 0 ? (allTimeScore/allTimeCount).toFixed(2) : 'N/A' };
        }).sort((a,b) => (b.avg === 'N/A' ? 1 : a.avg === 'N/A' ? -1 : b.avg - a.avg));

        const stopWords = ['the','and','was','for','that','this','with','not','very','but','are','you','they','were','from','have','had','has','our'];
        const words = allCommentsText.toLowerCase().match(/\b[a-z]{4,}\b/g) || [];
        const counts = {}; words.forEach(w => { if(!stopWords.includes(w)) counts[w] = (counts[w] || 0) + 1; });
        const wordCloud = Object.keys(counts).map(word => ({text: word, value: counts[word]})).sort((a,b)=>b.value-a.value).slice(0, 15);

        const recRate = (genTallies['gen_5'].overall.Yes + genTallies['gen_5'].overall.No) > 0 
          ? Math.round((genTallies['gen_5'].overall.Yes / (genTallies['gen_5'].overall.Yes + genTallies['gen_5'].overall.No)) * 100) : 0;

        return { 
          totalResponses: responses.length, 
          overallAvg: totalQuestionsAnswered > 0 ? (totalScore / totalQuestionsAnswered).toFixed(2) : "0.00", 
          recommendationRate: recRate, deptAverages, allTimeDeptAverages, wordCloud, genTallies, monthlyResponsesTally,
          curMonthStr, prevMonthStr
        };
      }, [responses, departments]);

      const handleAddDepartment = (e) => {
        e.preventDefault(); if(!newDeptName.trim()) return;
        const newId = 'dept_' + Date.now();
        setDepartments([...departments, { id: newId, title: `${departments.length + 1}. ${newDeptName.trim()}`, questions: [] }]);
        setActiveDepartments({...activeDepartments, [newId]: true}); setNewDeptName('');
      };
      const handleAddQuestion = (deptId) => {
        const qText = newQuestions[deptId]; if(!qText || !qText.trim()) return;
        setDepartments(departments.map(d => d.id === deptId ? {...d, questions: [...d.questions, {id: 'q_'+Date.now(), text: qText.trim()}]} : d ));
        setNewQuestions({...newQuestions, [deptId]: ''});
      };

      return (
        <div className="bg-white/95 backdrop-blur-md rounded-[2rem] shadow-2xl border border-white overflow-hidden min-h-[75vh] animate-in fade-in duration-500 font-sans print-dashboard relative">
          <div className="bg-slate-900 text-white p-8 sm:p-12 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 relative overflow-hidden shrink-0">
            <div className="absolute top-0 right-0 w-64 h-64 bg-emerald-500 rounded-full mix-blend-overlay filter blur-3xl opacity-20 translate-x-1/2 -translate-y-1/2"></div>
            <div className="relative z-10">
              <h2 className="text-3xl font-black flex items-center gap-3 font-serif"><LayoutDashboard className="w-8 h-8 text-emerald-400" /> Master Admin Portal</h2>
              <p className="text-emerald-100/80 mt-2 font-medium">Facility-wide analytics, trends, and configurations.</p>
            </div>
            <button onClick={() => window.print()} className="relative z-10 bg-slate-800 text-white px-5 py-2.5 rounded-xl font-bold flex items-center gap-2 hover:bg-slate-700 no-print border border-slate-700 shadow-sm"><Printer className="w-5 h-5" /> Print Report</button>
          </div>

          <div className="flex border-b border-slate-200 px-6 sm:px-10 bg-slate-50/80 overflow-x-auto custom-scrollbar no-print shrink-0 pb-1">
            {['overview', 'monthly report', 'critical alerts', 'comments & suggestions', 'settings'].map(tab => (
              <button key={tab} onClick={()=>setActiveTab(tab)} className={`whitespace-nowrap py-5 px-5 font-bold text-sm sm:text-base border-b-4 transition-colors capitalize ${activeTab === tab ? 'border-emerald-600 text-emerald-800' : 'border-transparent text-slate-400 hover:text-slate-800'}`}>
                {tab}
              </button>
            ))}
          </div>

          <div className="p-6 sm:p-10">
            
            {/* 1. OVERVIEW TAB */}
            {activeTab === 'overview' && (
              <div className="space-y-12 animate-in slide-in-from-bottom-2">
                
                <div className="grid grid-cols-1 sm:grid-cols-3 gap-6">
                  <div onClick={() => setDrillDown({ type: 'responses_trend', data: analytics.monthlyResponsesTally, questionText: 'Total surveys completed by patients' })} className="bg-slate-50 border border-slate-200 rounded-2xl p-6 shadow-sm cursor-pointer hover:border-slate-400 transition-colors group">
                    <p className="text-slate-500 font-bold flex justify-between items-center">Total Local Responses <ChevronRight className="w-4 h-4 opacity-0 group-hover:opacity-100 transition-opacity"/></p>
                    <p className="text-5xl font-black text-slate-800 mt-2">{analytics.totalResponses}</p>
                    <p className="text-xs font-bold text-slate-400 mt-2 uppercase tracking-wide">Click for history</p>
                  </div>
                  <div onClick={() => setDrillDown({ type: 'facility_avg', data: analytics.allTimeDeptAverages, questionText: 'Overall average breakdown by department' })} className="bg-emerald-50 border border-emerald-200 rounded-2xl p-6 shadow-sm cursor-pointer hover:border-emerald-400 transition-colors group">
                    <p className="text-emerald-800 font-bold flex justify-between items-center">Facility Avg Score <ChevronRight className="w-4 h-4 opacity-0 group-hover:opacity-100 transition-opacity"/></p>
                    <p className="text-5xl font-black text-emerald-900 mt-2">{analytics.overallAvg} <span className="text-xl text-emerald-700">/ 4.0</span></p>
                    <p className="text-xs font-bold text-emerald-600 mt-2 uppercase tracking-wide">Combined average of all depts</p>
                  </div>
                  <div className="bg-blue-50 border border-blue-200 rounded-2xl p-6 shadow-sm">
                    <p className="text-blue-800 font-bold">Recommendation Rate</p>
                    <p className="text-5xl font-black text-blue-900 mt-2">{analytics.recommendationRate}%</p>
                    <p className="text-xs font-bold text-blue-600 mt-2 uppercase tracking-wide">Based on "Would you recommend..."</p>
                  </div>
                </div>

                <div className="bg-slate-50 border border-slate-200 p-8 rounded-[2rem]">
                   <h3 className="text-2xl font-bold text-slate-800 mb-6 flex items-center gap-2 font-serif"><Star className="w-6 h-6 text-amber-500" /> Facility-Wide Insights</h3>
                   
                   <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mb-6">
                     {GENERAL_QUESTIONS.filter(q => q.type === 'yesno').map(q => {
                       const tally = analytics.genTallies[q.id];
                       const total = tally.overall.Yes + tally.overall.No;
                       const pctYes = total > 0 ? Math.round((tally.overall.Yes / total) * 100) : 0;

                         <div key={q.id} onClick={() => setDrillDown({ type: 'general_question', data: tally, questionText: q.text })} className="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm hover:border-emerald-400 cursor-pointer transition-all group">

                           <div className="flex items-end justify-between">
                             <div>
                               <p className="text-3xl font-black text-emerald-600">{pctYes}% <span className="text-sm text-slate-400">YES</span></p>
                               <p className="text-xs font-bold text-slate-400 mt-1">{tally.overall.No} answered No</p>
                             </div>
                             <div className="w-8 h-8 rounded-full bg-slate-50 flex items-center justify-center group-hover:bg-emerald-50 text-slate-400 group-hover:text-emerald-600 no-print"><ChevronRight className="w-5 h-5"/></div>
                           </div>
                         </div>
                       )
                     })}

                   <div onClick={() => setDrillDown({ type: 'general_question', data: analytics.genTallies['gen_3'], questionText: analytics.genTallies['gen_3'].text })} className="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm hover:border-amber-400 cursor-pointer transition-all group">
                      <div className="flex justify-between items-start mb-4">
                        <p className="text-sm font-bold text-slate-600">{analytics.genTallies['gen_3'].text}</p>

                </div>

            )}

            {activeTab === 'monthly report' && (
               <div className="space-y-8 animate-in slide-in-from-bottom-2">
                 <div className="flex items-center justify-between mb-8">
                   <div>
                     <h3 className="text-2xl font-bold text-slate-800 font-serif flex items-center gap-2"><CalendarDays className="w-6 h-6 text-emerald-600" /> Monthly Comparative Report</h3>
                     <p className="text-slate-500 mt-1">Comparing {analytics.curMonthStr} with {analytics.prevMonthStr}</p>
                   </div>
                 </div>

                 <div className="bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden">
                   <table className="w-full text-left border-collapse">
                     <thead>
                       <tr className="bg-slate-900 text-white font-bold">
                         <th className="p-4 px-6 border-b border-slate-700">Department</th>
                         <th className="p-4 px-6 border-b border-slate-700 text-center">Previous Month ({analytics.prevMonthStr})</th>
                         <th className="p-4 px-6 border-b border-slate-700 text-center">Current Month ({analytics.curMonthStr})</th>
                         <th className="p-4 px-6 border-b border-slate-700 text-center">Trend (Change)</th>
                       </tr>
                     </thead>
                     <tbody className="divide-y divide-slate-200">
                       {analytics.deptAverages.map(dept => (
                         <tr key={dept.id} className="hover:bg-slate-50 transition-colors">
                           <td className="p-4 px-6 font-bold text-slate-800">{dept.title.replace(/^\d+\.\s*/, '')}</td>
                           <td className="p-4 px-6 text-center font-medium text-slate-500">{dept.prevAvg}</td>
                           <td className={`p-4 px-6 text-center font-black ${dept.avg && parseFloat(dept.avg) < 3.0 ? 'text-red-600' : 'text-emerald-700'}`}>{dept.avg || 'N/A'}</td>
                           <td className="p-4 px-6 text-center">
                             {dept.trend ? (
                               <span className={`inline-flex items-center gap-1 font-bold px-3 py-1 rounded-lg ${dept.trend > 0 ? 'bg-emerald-100 text-emerald-700' : dept.trend < 0 ? 'bg-red-100 text-red-700' : 'bg-slate-100 text-slate-600'}`}>
                                 {dept.trend > 0 ? <TrendingUp className="w-4 h-4"/> : dept.trend < 0 ? <TrendingDown className="w-4 h-4"/> : null} 
                                 {dept.trend > 0 ? '+' : ''}{dept.trend}
                               </span>
                             ) : <span className="text-slate-400">-</span>}
                           </td>
                         </tr>
                       ))}
                     </tbody>
                   </table>
                 </div>
               </div>
            )}

            {/* 3. CRITICAL ALERTS TAB */}
            {activeTab === 'critical alerts' && (
               <div className="space-y-6 animate-in slide-in-from-bottom-2">
                 <div className="bg-red-50 border border-red-200 p-6 rounded-2xl mb-6">
                   <h3 className="text-xl font-bold text-red-800 flex items-center gap-2"><AlertTriangle className="w-6 h-6"/> Attention Required</h3>
                   <p className="text-red-700 mt-1">These responses contain at least one "Poor (1)" rating. Please review these immediately.</p>
                 </div>
                 {analytics.deptAverages.filter(d => d.alerts.length > 0).length === 0 ? (
                   <div className="text-center py-12 text-slate-500 font-bold bg-slate-50 rounded-2xl border border-dashed border-slate-200">No critical alerts detected!</div>
                 ) : (
                   analytics.deptAverages.filter(d => d.alerts.length > 0).map(dept => (
                     <div key={dept.id} className="border-2 border-red-100 rounded-2xl overflow-hidden shadow-sm">
                       <div className="bg-red-50/50 p-4 px-6 font-bold text-red-900 border-b border-red-100">{dept.title.replace(/^\d+\.\s*/, '')}</div>
                       <div className="divide-y divide-red-50">
                         {dept.alerts.map((alert, i) => (
                           <div key={i} className="p-6 bg-white"><p className="text-slate-800 font-medium text-lg">"{alert.text || 'No written comment.'}"</p><p className="text-sm text-slate-400 font-bold mt-2 uppercase">{new Date(alert.date).toLocaleString()}</p></div>
                         ))}
                       </div>
                     </div>
                   ))
                 )}
               </div>
            )}

            {/* 4. COMMENTS & SUGGESTIONS TAB */}
            {activeTab === 'comments & suggestions' && (
               <div className="space-y-10 animate-in slide-in-from-bottom-2">
                 {analytics.wordCloud.length > 0 && (
                   <div className="bg-slate-900 rounded-3xl p-8 shadow-xl text-center">
                     <h3 className="text-slate-400 font-bold mb-6 text-sm uppercase tracking-widest">Feedback Sentiment Cloud</h3>
                     <div className="flex flex-wrap justify-center gap-4 items-center">
                       {analytics.wordCloud.map((w, i) => {
                         const size = Math.max(1, Math.min(3, 1 + (w.value / 3))); const opacity = Math.max(0.4, Math.min(1, 0.4 + (w.value / 5)));
                         return <span key={i} className="font-black text-emerald-400 capitalize transition-transform hover:scale-110 cursor-default" style={{fontSize: `${size}rem`, opacity: opacity}}>{w.text}</span>
                       })}
                     </div>
                   </div>
                 )}
                 <div className="space-y-8">
                   {analytics.deptAverages.filter(d => d.comments.length > 0).map(dept => (
                     <div key={dept.id} className="border border-slate-200 rounded-2xl overflow-hidden shadow-sm">
                       <div className="bg-slate-50 border-b border-slate-200 p-4 px-6 font-bold text-slate-800 flex justify-between">{dept.title.replace(/^\d+\.\s*/, '')} <span>Avg: {dept.avg}</span></div>
                       <div className="divide-y divide-slate-100">
                         {dept.comments.map((c, i) => (
                           <div key={i} className="p-6 bg-white flex gap-4">
                             {c.type === 'improvement' ? <AlertTriangle className="w-6 h-6 text-amber-500 shrink-0" /> : <ThumbsUp className="w-6 h-6 text-emerald-500 shrink-0" />}
                             <div><p className="text-slate-800 font-medium">{c.text}</p><p className="text-xs text-slate-400 font-bold mt-2 uppercase">{new Date(c.date).toLocaleString()}</p></div>
                           </div>
                         ))}
                       </div>
                     </div>
                   ))}
                 </div>

            {/* 5. SETTINGS & EDITOR TAB */}
            {activeTab === 'settings' && (
               <div className="animate-in slide-in-from-bottom-2 space-y-10 no-print">
                 <form onSubmit={handleAddDepartment} className="bg-emerald-50 border border-emerald-200 p-6 rounded-2xl flex flex-col sm:flex-row gap-4 items-end shadow-sm">
                   <div className="flex-1 w-full"><label className="block text-emerald-900 font-bold mb-2">Create New Department</label><input type="text" value={newDeptName} onChange={(e)=>setNewDeptName(e.target.value)} placeholder="e.g. Outpatient Department" className="w-full p-4 rounded-xl border border-emerald-200 outline-none focus:border-emerald-500 font-medium" /></div>
                   <button type="submit" className="w-full sm:w-auto bg-emerald-600 hover:bg-emerald-700 text-white font-bold px-8 py-4 rounded-xl flex items-center justify-center gap-2"><Plus className="w-5 h-5"/> Add Unit</button>
                 </form>
                 <div className="space-y-6">
                   {departments.map(dept => (
                     <div key={dept.id} className="bg-white border border-slate-200 rounded-2xl overflow-hidden shadow-sm">
                       <div className="bg-slate-50 p-5 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 border-b border-slate-200">
                          <span className="font-bold text-slate-800 text-lg flex items-center gap-2"><Edit2 className="w-4 h-4 text-slate-400" /> {dept.title}</span>
                          <label className="flex items-center gap-3 cursor-pointer group">
                            <span className="text-sm font-bold text-slate-500 group-hover:text-slate-800">Survey Visibility</span>
                            <div className={`w-12 h-6 rounded-full p-1 transition-colors ${activeDepartments[dept.id] ? 'bg-emerald-500' : 'bg-slate-300'}`}><div className={`w-4 h-4 bg-white rounded-full shadow-md transition-transform ${activeDepartments[dept.id] ? 'translate-x-6' : 'translate-x-0'}`}></div></div>
                            <input type="checkbox" className="hidden" checked={activeDepartments[dept.id]} onChange={() => setActiveDepartments(prev => ({...prev, [dept.id]: !prev[dept.id]}))} />
                          </label>
                       </div>
                       <div className="p-5 space-y-4">
                         {dept.questions.length === 0 ? <p className="text-sm italic text-slate-400">No questions added yet.</p> : (
                           <ul className="list-disc list-inside space-y-2">{dept.questions.map((q, i) => <li key={q.id} className="text-slate-700 text-sm font-medium"><span className="text-emerald-600 mr-1 font-bold">Q{i+1}:</span> {q.text}</li>)}</ul>
                         )}
                         <div className="flex gap-3 mt-4 border-t border-slate-100 pt-4">
                           <input type="text" placeholder="Add a new question to this unit..." className="flex-1 p-3 rounded-xl border border-slate-200 outline-none focus:border-emerald-400 text-sm font-medium" value={newQuestions[dept.id] || ''} onChange={(e) => setNewQuestions({...newQuestions, [dept.id]: e.target.value})} onKeyDown={(e) => e.key === 'Enter' && handleAddQuestion(dept.id)} />
                           <button onClick={() => handleAddQuestion(dept.id)} className="bg-slate-800 text-white px-5 py-2 rounded-xl text-sm font-bold hover:bg-slate-700 transition-colors">Add</button>
                         </div>
                       </div>
                     </div>
                   ))}
                 </div>
               </div>
            )}
          </div>
        </div>
      );
    }

    // --- DEPARTMENT DASHBOARD ---
    function DepartmentDashboard({ responses, deptId, departments }) {
      const dept = departments.find(d => d.id === deptId);
      
      const monthlyData = useMemo(() => {
        const months = {}; 
        responses.forEach(res => {
          const dData = res.departments?.[deptId];
          if (dData && !dData.skipped && dData.answers) {
            const dateObj = new Date(res.timestamp);
            const monthKey = getMonthString(dateObj);
            const monthLabel = dateObj.toLocaleString('default', { month: 'short', year: 'numeric' });
            
            if (!months[monthKey]) months[monthKey] = { label: monthLabel, totalScore: 0, count: 0, comments: [] };
            
            let localScore = 0; let localCount = 0;
            Object.values(dData.answers).forEach(score => { localScore += score; localCount++; months[monthKey].totalScore += score; months[monthKey].count += 1; });
            if (dData.comment) {
               const avg = localCount > 0 ? (localScore/localCount) : 0;
               months[monthKey].comments.push({ text: dData.comment, date: res.timestamp, type: avg <= 2.5 ? 'improvement' : 'compliment' });
            }
          }
        });

        return Object.keys(months).sort().map(key => {
          const d = months[key];
          return { label: d.label, avg: (d.totalScore / d.count).toFixed(2), comments: d.comments };
        }).reverse(); 
      }, [responses, deptId]);

      const latestMonth = monthlyData.length > 0 ? monthlyData[0] : null;

      return (
        <div className="bg-white rounded-[2rem] shadow-xl border border-slate-200 p-8 sm:p-12 print-dashboard relative">
          <div className="absolute inset-0 z-0 opacity-10 pointer-events-none hidden print:block" style={{backgroundImage: `url('${BACKGROUND_URL}')`, backgroundSize: 'cover', backgroundPosition: 'center'}} />
          <div className="relative z-10">
            <div className="flex justify-between items-start mb-8 border-b border-slate-200 pb-6">
              <div><h2 className="text-3xl font-bold text-slate-900 font-serif">{dept?.title.replace(/^\d+\.\s*/, '')} Report</h2><p className="text-slate-500 mt-1 font-sans">Monthly Performance Analytics</p></div>
              <button onClick={() => window.print()} className="bg-slate-800 text-white px-5 py-2.5 rounded-xl font-bold flex items-center gap-2 hover:bg-slate-700 no-print font-sans"><Printer className="w-5 h-5" /> Print Report</button>
            </div>

            {monthlyData.length === 0 ? ( <div className="text-center py-16 text-slate-500 italic">No data recorded for this department yet.</div> ) : (
              <div className="space-y-12">
                <div className="bg-emerald-50 border border-emerald-100 p-6 rounded-2xl w-full sm:w-1/2">
                  <p className="text-emerald-800 font-bold font-sans">Latest Monthly Average ({latestMonth.label})</p>
                  <p className="text-5xl font-black text-emerald-900 mt-2 font-sans">{latestMonth.avg} <span className="text-xl text-emerald-700">/ 4.0</span></p>
                </div>
                <div>
                  <h3 className="text-xl font-bold text-slate-800 mb-6 font-serif">Historical Trend (Month over Month)</h3>
                  <div className="flex items-end gap-4 h-64 border-b-2 border-slate-200 pb-2 font-sans">
                    {monthlyData.slice().reverse().map((m, i) => { 
                      const heightPct = (parseFloat(m.avg) / 4.0) * 100;
                      return (
                        <div key={i} className="flex flex-col items-center flex-1 group">
                          <div className="opacity-0 group-hover:opacity-100 transition-opacity text-sm font-bold mb-2 print:opacity-100">{m.avg}</div>
                          <div className={`w-full max-w-[4rem] rounded-t-md transition-all ${parseFloat(m.avg) < 3.0 ? 'bg-amber-400' : 'bg-emerald-500'}`} style={{ height: `${heightPct}%`, minHeight: '10%' }}></div>
                          <div className="text-xs font-bold text-slate-500 mt-3 rotate-45 sm:rotate-0 origin-left print:rotate-0 whitespace-nowrap">{m.label}</div>
                        </div>
                      );
                    })}
                  </div>
                </div>
                <div>
                  <h3 className="text-xl font-bold text-slate-800 mb-4 font-serif">Feedback from {latestMonth.label}</h3>
                  {latestMonth.comments.length === 0 ? ( <p className="text-slate-500 italic">No written feedback this month.</p> ) : (
                    <div className="space-y-4">
                      {latestMonth.comments.map((c, i) => (
                        <div key={i} className="p-5 bg-slate-50 rounded-xl border border-slate-200 flex gap-4">
                           {c.type === 'improvement' ? <AlertTriangle className="w-5 h-5 text-amber-500 shrink-0" /> : <ThumbsUp className="w-5 h-5 text-emerald-500 shrink-0" />}
                           <div><p className="text-slate-800 font-medium font-sans">{c.text}</p><p className="text-xs text-slate-400 mt-2 font-sans">{new Date(c.date).toLocaleDateString()}</p></div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              </div>
            )}
          </div>
        </div>
      );
    }

    // --- PRINTABLE QR GENERATOR COMPONENT ---
    function QRGenerator() {
      const currentUrl = window.location.href.split('?')[0]; 
      const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=500x500&data=${encodeURIComponent(currentUrl)}`;

      return (
        <div className="space-y-6 animate-in slide-in-from-bottom-2">
           <div className="flex justify-between items-center bg-white/90 backdrop-blur-sm p-6 rounded-2xl border border-slate-200 shadow-md no-print font-sans">
             <div><h3 className="font-bold text-xl text-slate-900">QR Code Scanner</h3><p className="text-slate-500 text-sm mt-1">Have patients scan this screen directly, or print it to hang on a wall.</p></div>
             <button onClick={() => window.print()} className="bg-emerald-600 text-white px-6 py-3 rounded-xl font-bold shadow-md hover:bg-emerald-700 flex items-center gap-2"><Printer className="w-5 h-5" /> Print Poster</button>
           </div>
           <div className="print-dashboard bg-white min-h-[100vh] w-full flex flex-col items-center justify-center p-8 relative flex sm:border border-slate-200 sm:rounded-3xl sm:min-h-[70vh] sm:py-16 sm:shadow-2xl overflow-hidden font-sans">
              <div className="absolute inset-0 z-0 opacity-[0.15] pointer-events-none" style={{backgroundImage: `url('${BACKGROUND_URL}')`, backgroundSize: 'cover', backgroundPosition: 'center'}} />
              <div className="relative z-10 flex flex-col items-center text-center max-w-2xl">
                <img src={LOGO_URL} alt="Taytay Doctors Logo" className="h-32 mb-8 object-contain drop-shadow-md" />
                <h1 className="text-4xl sm:text-5xl font-black text-slate-900 mb-4 tracking-tight leading-tight uppercase font-serif">Patient Satisfaction Survey</h1>
                <p className="text-xl sm:text-2xl text-slate-600 mb-10 font-medium">Scan the QR code below with your smartphone camera to rate your experience.</p>
                <div className="bg-white p-6 rounded-3xl shadow-xl border-4 border-emerald-500 mb-10"><img src={qrUrl} alt="QR Code" className="w-64 h-64 sm:w-80 sm:h-80 object-contain" /></div>
                <div className="text-slate-400 font-bold text-lg flex items-center gap-2"><span className="w-16 h-px bg-slate-300"></span> Thank You <span className="w-16 h-px bg-slate-300"></span></div>
              </div>
              <div className="absolute bottom-8 right-8 text-sm font-bold text-slate-400 tracking-widest bg-white/80 px-2 py-1 rounded">{FORM_CONTROL_NO}</div>
           </div>
        </div>
      );
    }

    // --- MOUNT THE APP ---
    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
